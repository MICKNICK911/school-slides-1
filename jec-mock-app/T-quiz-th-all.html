    <style>
        /* Base Styles */
        :root {
            --primary-color: #1a365d;
            --accent-color: #3182ce;
            --bg-color: #f7fafc;
            --card-color: #ffffff;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
            --radius: 10px;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: #2d3748;
            margin: 0;
            padding: 20px;
            padding-bottom: 50px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .header h1 {
            color: var(--primary-color);
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        .header p {
            color: #718096;
            font-size: 1rem;
        }

        /* Set Navigation Tabs */
        .set-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .set-btn {
            background: #e2e8f0;
            color: #4a5568;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .set-btn:hover {
            background: #cbd5e0;
        }
        .set-btn.active {
            background: var(--primary-color);
            color: white;
            box-shadow: 0 4px 12px rgba(26, 54, 93, 0.3);
        }

        /* Question Cards Container */
        #question-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Individual Question Cards */
        .q-card {
            background: var(--card-color);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            border-left: 5px solid #a0aec0; /* Default color */
            transition: all 0.2s;
            cursor: pointer;
        }
        /* Module Colors for Visual Identification */
        .q-card.module-jeb { border-color: #e53e3e; }
        .q-card.module-jed { border-color: #d69e2e; }
        .q-card.module-jen { border-color: #38a169; }
        .q-card.module-jmc { border-color: #3182ce; }
        .q-card.module-jsc { border-color: #805ad5; }

        .q-header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 15px;
        }
        .q-info {
            flex: 1;
        }
        .q-module {
            font-size: 0.75rem;
            font-weight: bold;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }
        .q-text {
            font-size: 1.05rem;
            font-weight: 500;
            line-height: 1.5;
            word-break: break-word;
        }
        .q-marks {
            background: #edf2f7;
            color: #4a5568;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: bold;
            white-space: nowrap;
        }
        .q-indicator {
            color: #a0aec0;
            font-size: 1.2rem;
            transition: 0.3s;
        }
        .q-card.open .q-indicator {
            transform: rotate(180deg);
        }

        /* Model Answer Section (Hidden by default) */
        .q-answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-in-out, padding 0.3s;
            padding: 0 20px;
            background: #f7fafc;
            border-top: 1px solid #e2e8f0;
        }
        .q-card.open .q-answer {
            max-height: 5000px; /* High enough to contain any answer */
            padding: 20px;
        }
        .q-answer h4 {
            color: var(--accent-color);
            margin: 0 0 10px 0;
            font-size: 1rem;
        }
        .q-answer p, .q-answer ul {
            margin: 5px 0;
            line-height: 1.6;
            color: #2d3748;
            font-size: 0.95rem;
        }
        .q-answer ul {
            padding-left: 20px;
        }
        .q-answer b {
            color: var(--primary-color);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            color: #718096;
            padding: 40px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .header h1 { font-size: 1.4rem; }
            .set-btn { padding: 8px 18px; font-size: 0.9rem; }
            .q-text { font-size: 0.95rem; }
            .q-answer ul { padding-left: 15px; }
        }
    </style>

    <script>
        // ==========================================
        // AUTOMATIC MATH & SCIENCE FORMATTER
        // ==========================================
        function migrateMath(text) {
            // Helper to replace with consistent \( \) delimiters for KaTeX
            const wrap = (str) => `\\( ${str} \\)`;

            // ================= MATH FORMATS =================
            // 1. Mixed numbers (e.g., "1 2/3") -> 1\frac{2}{3}
            text = text.replace(/(\d+)\s+(\d+)\/(\d+)/g, (match, whole, num, den) => wrap(`${whole}\\frac{${num}}{${den}}`));

            // 2. Fractions (e.g., "5/3") -> \frac{5}{3}
            text = text.replace(/(\d+)\/(\d+)/g, (match, num, den) => wrap(`\\frac{${num}}{${den}}`));

            // 3. Square roots (e.g., "sqrt(16)") -> \sqrt{16}
            text = text.replace(/sqrt\(([^)]+)\)/g, (match, contents) => wrap(`\\sqrt{${contents}}`));

            // 4. Powers (e.g., "x^2" or "x^{10}") -> x^{2}
            text = text.replace(/([a-zA-Z])\^(\{?\d+\}?)/g, (match, base, power) => wrap(`${base}^{${power}}`));

            // 5. Subscripts (e.g., "x_1") -> x_{1}
            text = text.replace(/([a-zA-Z])_(\d+)/g, (match, base, subscript) => wrap(`${base}_{${subscript}}`));

            // 6. Composite functions (e.g., "fog" or "gof") -> f \circ g
            text = text.replace(/fog/g, wrap(`f \\circ g`));
            text = text.replace(/gof/g, wrap(`g \\circ f`));

            // 7. Division symbol (e.g., "÷") -> \div
            text = text.replace(/÷/g, wrap(`\\div`));

            // ================= SCIENCE FORMATS =================
            // 8. Chemical Formulas (e.g., "H2O", "CO2", "NaCl", "H2SO4")
            // Matches a capital letter (optional lowercase) followed by one or more numbers
            text = text.replace(/([A-Z][a-z]?)(\d+)/g, (match, element, num) => {
                return wrap(`${element}_{${num}}`);
            });

            // 9. Scientific Units with exponents (e.g., "m/s^2", "m/s2", "km/h")
            // Matches units followed by / followed by another unit and possible exponents
            text = text.replace(/([a-zA-Z]\/[a-zA-Z])(\^?\d+)?/g, (match, unit, exp) => {
                if (exp) return wrap(`${unit}^{${exp.replace('^', '')}}`);
                return wrap(unit);
            });

            // 10. Degree Celsius/Fahrenheit (e.g., "100°C", "25°C")
            text = text.replace(/(\d+)°([C|F])/g, (match, num, unit) => wrap(`${num}^{\\circ}${unit}`));

            // 11. Square/Cubic Units (e.g., "m2", "cm3" -> m^2, cm^3)
            // Only safe to do if preceded by a letter and followed by a boundary (not a word)
            text = text.replace(/([a-zA-Z])2\b/g, (match, unit) => wrap(`${unit}^2`));
            text = text.replace(/([a-zA-Z])3\b/g, (match, unit) => wrap(`${unit}^3`));

            return text;
        }

        // ==========================================
        // DATA PLACEHOLDERS
        // ==========================================
        // IMPORTANT: PASTE YOUR 6 CHUNKS HERE. 
        // Replace the [] arrays below with your full const questionsDataChunk1 = [...] arrays.
        // ==========================================
// CHUNK 1: Set 1 (JEB Q1-Q2, JED Q1-Q2, JEN Q1-Q2)
// ==========================================
const questionsDataChunk1 = [
    { set: 1, module: 'JEB 115', moduleClass: 'module-jeb', marks: 15, text: `1. (a) Using a real classroom example, explain how you would implement inquiry-based learning to improve pupils' understanding of a difficult topic. (b) Identify and describe any FIVE (5) key expectations of a student teacher during Supported Teaching in School (STS).`, 
    answer: `<h4>MODEL ANSWER (15 Marks)</h4><p><b>(a) Implementing Inquiry-Based Learning (6 marks):</b></p><ul><li><b>Definition:</b> Inquiry-based learning is a student-centred approach where learners explore questions, investigate phenomena, and draw conclusions (2 marks).</li><li><b>Example (Primary 4 - Photosynthesis):</b> A teacher poses the question: "Why do some seeds grow faster than others?" (1 mark). Students make predictions (hypotheses) (1 mark). They then set up an experiment placing seeds in different environments (sunlight, dark, water, no water) (1 mark). They collect data over a week and discuss their findings, concluding with the teacher's guidance that plants need light and water to grow (1 mark).</li></ul><p><b>(b) Five Expectations of a Student Teacher during STS (9 marks):</b></p><ul><li><b>1. Professional Conduct:</b> Dress appropriately, be punctual, maintain confidentiality, and respect school staff (1.5 marks).</li><li><b>2. Lesson Planning:</b> Prepare detailed, standards-based lesson notes and submit them to the mentor for approval before teaching (1.5 marks).</li><li><b>3. Classroom Management:</b> Establish routines, manage learner behaviour positively, and create a safe and inclusive environment (1.5 marks).</li><li><b>4. Assessment of Learners:</b> Use formative and summative assessments (quizzes, assignments) to monitor progress and give constructive feedback (1.5 marks).</li><li><b>5. Collaboration and Reflective Practice:</b> Work with the mentor and other staff, participate in school activities, and keep a teaching journal to reflect on strengths and weaknesses (1.5 marks).</li></ul>` },
    { set: 1, module: 'JEB 115', moduleClass: 'module-jeb', marks: 15, text: `2. (a) Explain the concept of Special Educational Needs (SEN). (b) Identify and describe any FIVE (5) different categories of learners with special needs recognized in Ghanaian education.`, 
    answer: `<h4>MODEL ANSWER (15 Marks)</h4><p><b>(a) Concept of SEN (3 marks):</b><br>Special Educational Needs refers to the learning needs of children who have difficulties that require additional or different support than the majority of children of the same age (1 mark). Children with SEN may face barriers to learning due to physical, sensory, intellectual, emotional, or social factors (1 mark). Inclusive education means adapting teaching methods, materials, and the environment so these learners can participate alongside peers (1 mark).</p><p><b>(b) Five Categories of Learners with SEN (12 marks):</b></p><ul><li><b>1. Visual Impairment:</b> Learners who are blind or have low vision. They need braille, large print, audio materials, and orientation support (2.5 marks).</li><li><b>2. Hearing Impairment:</b> Learners who are deaf or hard of hearing. They require sign language, visual aids, and assistive listening devices (2.5 marks).</li><li><b>3. Physical Disability:</b> Learners with mobility difficulties (e.g., cerebral palsy). They need ramps, adapted furniture, and assistive devices (2.5 marks).</li><li><b>4. Learning Disability:</b> Learners with specific difficulties in reading (dyslexia), writing (dysgraphia), or maths (dyscalculia). They need multisensory teaching and extra time (2.5 marks).</li><li><b>5. Intellectual Disability:</b> Learners with significantly below-average cognitive functioning (e.g., Down syndrome). They need simplified tasks, repetition, and life skills training (2 marks).</li></ul>` },
    { set: 1, module: 'JED 115', moduleClass: 'module-jed', marks: 15, text: `1. (a) Explain any FIVE (5) importance of education to Ghana's development. (b) It has been argued for a long time whether teaching is a profession or not. As a student teacher, explain any FIVE (5) reasons to justify that teaching is a profession.`, 
    answer: `<h4>MODEL ANSWER (15 Marks)</h4><p><b>(a) Five Importance of Education to Ghana's Development (6 marks):</b></p><ul><li><b>1. Reduces Poverty:</b> Educated citizens secure stable employment, lifting households out of poverty (1 mark).</li><li><b>2. Builds a Better Society:</b> Education creates informed citizens capable of making rational choices and contributing to nation-building (1 mark).</li><li><b>3. Promotes National Development:</b> An educated workforce drives growth in economic, socio-cultural, technological, and political sectors (1 mark).</li><li><b>4. Empowers Individuals:</b> Education provides the power of freedom, choice, and decision-making to its citizens (1 mark).</li><li><b>5. Personal Development:</b> It imparts knowledge and judgment, making individuals confident and prepared to face life's challenges (1 mark).</li></ul><p><b>(b) Five Reasons Justifying Teaching as a Profession (9 marks):</b></p><ul><li><b>1. Specialized Body of Knowledge:</b> Teachers must complete a formal training period (e.g., 4-year B.Ed) to acquire subject and pedagogical knowledge (1.5 marks).</li><li><b>2. Registration of Entry:</b> Entry into the profession is restricted and requires meeting prescribed standards, such as licensing by the National Teaching Council (NTC) (1.5 marks).</li><li><b>3. Code of Ethics:</b> The Ghana Education Service provides a professional code of conduct to govern teachers' behavior (1.5 marks).</li><li><b>4. Professional Associations:</b> Teachers have unions like GNAT and NAGRAT which represent their interests and regulate the group's activities (1.5 marks).</li><li><b>5. Legal Backing and CPD:</b> The profession is legally recognized, and teachers are required to engage in Continuous Professional Development (CPD) to maintain their skills (1.5 marks).</li></ul>` },
    { set: 1, module: 'JED 115', moduleClass: 'module-jed', marks: 15, text: `2. (a) Explain the concept of 'school-community relationship'. (b) As a headteacher of a basic school, discuss any FOUR (4) ways by which you can promote a healthy school-community relationship.`, 
    answer: `<h4>MODEL ANSWER (15 Marks)</h4><p><b>(a) Concept of School-Community Relationship (3 marks):</b><br>It refers to the mutual interaction between the school and the community in which both assist each other to achieve their respective goals (1 mark). It is a planned activity where the school learns about the community and involves the community in planning and evaluating school policies and progress (2 marks).</p><p><b>(b) Four Ways to Promote a Healthy Relationship (12 marks):</b></p><ul><li><b>1. Through Students:</b> Students act as ambassadors. A child's positive understanding of the school's instructional program and general attitude helps parents decide on the school's reputation (3 marks).</li><li><b>2. Through the Parent-Teacher Association (PTA):</b> Strong PTAs facilitate cooperation. Parents can support the school through financial contributions, projects, and disciplinary support (3 marks).</li><li><b>3. Through School Reports and Magazines:</b> Publishing school magazines and termly reports on students' performance informs parents about how academically serious their children are and keeps them engaged (3 marks).</li><li><b>4. Through Speech and Prize-Giving Days:</b> Organizing open days and prize-giving ceremonies allows the public to see the school's achievements, exhibitions, and dramas, which advertise the school and build public confidence in its programmes (3 marks).</li></ul>` },
    { set: 1, module: 'JEN 117', moduleClass: 'module-jen', marks: 15, text: `1. (a) State any FOUR (4) of the Language Acquisition Theories you have learnt. (b) Explain the Behaviourist Theory of Language Acquisition. (c) State and explain any THREE (3) implications of the Behaviourist Theory to the teaching of English as a second language teacher.`, 
    answer: `<h4>MODEL ANSWER (15 Marks)</h4><p><b>(a) Four Language Acquisition Theories (4 marks):</b></p><ul><li>1. The Behaviourist Theory.</li><li>2. The Innatist Theory.</li><li>3. The Cognitivist Theory.</li><li>4. The Discourse Theory.</li></ul><p><b>(b) The Behaviourist Theory (6 marks):</b><br>The Behaviourist theory, championed by B.F. Skinner, states that children learn language through a process of <b>imitation, practice, reinforcement, and habit formation</b> (2 marks). Human role models in the environment provide stimuli (language sounds). When a child attempts to imitate these sounds, they are praised or rewarded (positive reinforcement) which encourages them to repeat the sounds until they form a habit of correct usage (2 marks). The quality and quantity of language the child hears, combined with consistent reinforcement, determines success in language learning (2 marks).</p><p><b>(c) Three Implications for Teachers (5 marks):</b></p><ul><li><b>1. Teacher as Role Model:</b> The teacher must provide the right models in speaking and handwriting, as learners will imitate them (1.5 marks).</li><li><b>2. Use of Language Drills:</b> Teachers should use repetition drills (e.g., "How much is the pencil? It is two cedis") to help pupils practice and memorize grammatical structures (1.5 marks).</li><li><b>3. Use of Motivation:</b> Teachers should use praise, clapping, or tangible rewards as positive reinforcement to encourage learners to perform better in the L2 (2 marks).</li></ul>` },
    { set: 1, module: 'JEN 117', moduleClass: 'module-jen', marks: 15, text: `2. Brian Cambourne indicates eight conditions of literacy development; state and explain any FIVE (5) of the conditions.`, 
    answer: `<h4>MODEL ANSWER (15 Marks)</h4><p><b>Brian Cambourne's Conditions (5 marks for naming, 10 marks for explaining):</b></p><ul><li><b>1. Immersion:</b> Children must be surrounded by interesting high-quality books, charts, labels, and newspapers. Teachers should read aloud daily and use movement and dance to engage learners in literacy (3 marks).</li><li><b>2. Demonstration:</b> Teachers must model reading and writing. Children should see their teachers write letters, read stories for real purposes, and show them how to hold a book and turn pages (3 marks).</li><li><b>3. Engagement:</b> Help children become active learners who see themselves as potential readers and writers by providing a risk-free environment with easy access to paper, pencils, crayons, and books (3 marks).</li><li><b>4. Expectation:</b> Set realistic expectations based on developmental stages. Believe that children will become accomplished readers and writers in their own time (3 marks).</li><li><b>5. Responsibility:</b> Give children choices about what to read. Set up an environment that promotes self-direction and accepts mistakes gently while guiding them towards accuracy (3 marks).</li></ul>` }
];

// ==========================================
// CHUNK 2: Set 1 (JMC Q1-Q2, JSC Q1-Q2) & Set 2 (JEB Q1-Q2)
// ==========================================
const questionsDataChunk2 = [
    { set: 1, module: 'JMC 116', moduleClass: 'module-jmc', marks: 15, text: `1. (a) In a class of 55 students, 25 offer Mathematics, 22 offer Physics, and 30 offer Chemistry. All the students take at least one of those subjects. 10 offer Physics and Mathematics, 8 offer Chemistry and Mathematics, and 6 offer Physics and Chemistry. (i) Represent this information on a Venn diagram. (ii) Find the number of students who offer all three subjects. (b) Two functions f and g are defined by f: x -> x + 2 and g: x -> 3x - 1. Find: (i) f ∘ g (x) (ii) g ∘ f (3).`, 
    answer: `<h4>MODEL ANSWER (15 Marks)</h4><p><b>(a) (i) Venn Diagram (6 marks):</b><br>Let U = 55, M=25, P=22, C=30. Intersections: M∩P=10, M∩C=8, P∩C=6. Let x = M∩P∩C.<br>M only = 25 - (10-x) - (8-x) - x = 7 + x<br>P only = 22 - (10-x) - (6-x) - x = 6 + x<br>C only = 30 - (8-x) - (6-x) - x = 16 + x<br>M∩P only = 10 - x; M∩C only = 8 - x; P∩C only = 6 - x.<br>Sum = (7+x) + (6+x) + (16+x) + (10-x) + (8-x) + (6-x) + x = 55. => 53 + x = 55 => x = 2.</p><p><b>(a) (ii) Number offering all three subjects (4 marks):</b><br>x = 2. Therefore, 2 students offer all three subjects.</p><p><b>(b) Composite Functions (5 marks):</b><br>(i) f ∘ g (x) = f(g(x)) = f(3x - 1) = (3x - 1) + 2 = 3x + 1 (2.5 marks).<br>(ii) g ∘ f (3) = g(f(3)) = g(3+2) = g(5) = 3(5) - 1 = 15 - 1 = 14 (2.5 marks).</p>` },
    { set: 1, module: 'JMC 116', moduleClass: 'module-jmc', marks: 15, text: `2. (a) Evaluate the following without the use of a calculator: (i) 1 2/3 + 2 1/5 - 1 2/15 (ii) 0.75 ÷ 3/2. (b) A trader bought 200 pairs of shoes for GH¢15,000.00. He sold each pair for GH¢84.00. Calculate: (i) The cost of one shoe. (ii) The total amount realized from sales. (iii) The profit or loss percent.`, 
    answer: `<h4>MODEL ANSWER (15 Marks)</h4><p><b>(a) (i) 1 2/3 + 2 1/5 - 1 2/15 (4 marks):</b><br>Step 1: Convert to improper fractions: 5/3 + 11/5 - 17/15.<br>Step 2: Find LCM of 3, 5, 15 = 15.<br>Step 3: (25/15) + (33/15) - (17/15) = (25 + 33 - 17)/15 = 41/15 = <b>2 11/15</b>.</p><p><b>(a) (ii) 0.75 ÷ 3/2 (4 marks):</b><br>0.75 = 3/4. So, 3/4 ÷ 3/2. Change division to multiplication by reciprocal: 3/4 × 2/3 = 6/12 = 1/2 = <b>0.5</b>.</p><p><b>(b) Trader Problem (7 marks):</b><br>(i) Cost of one shoe = Total Cost ÷ Quantity = GH¢15,000 ÷ 200 = <b>GH¢75.00</b> (2 marks).<br>(ii) Total Realized Sales = Selling Price × Quantity = GH¢84 × 200 = <b>GH¢16,800.00</b> (2 marks).<br>(iii) Profit = S.P - C.P = 16,800 - 15,000 = 1,800.<br>Profit % = (Profit / C.P) × 100% = (1,800 / 15,000) × 100% = 0.12 × 100% = <b>12%</b> (3 marks).</p>` },
    { set: 1, module: 'JSC 118', moduleClass: 'module-jsc', marks: 15, text: `1. (a) Briefly describe the FOUR (4) stages of the theory of cognitive development of children (Jean Piaget). (b) In the teaching of Integrated Science, process skills are crucial. Explain the following process skills and provide one classroom activity for each: (i) Observation (ii) Prediction.`, 
    answer: `<h4>MODEL ANSWER (15 Marks)</h4><p><b>(a) Piaget's Four Stages of Cognitive Development (8 marks):</b></p><ul><li><b>1. Sensorimotor Stage (0-2 yrs):</b> Infants learn through sensory experiences and manipulating objects (2 marks).</li><li><b>2. Preoperational Stage (2-7 yrs):</b> Children begin to think symbolically but lack logical reasoning and conservation (2 marks).</li><li><b>3. Concrete Operational Stage (7-11 yrs):</b> Children develop logical thinking but struggle with abstract concepts. They understand conservation (2 marks).</li><li><b>4. Formal Operational Stage (11+ yrs):</b> Adolescents develop abstract thinking, deductive reasoning, and hypothetical problem-solving (2 marks).</li></ul><p><b>(b) Process Skills and Classroom Activities (7 marks):</b></p><ul><li><b>(i) Observation (3 marks):</b> Using the five senses to gather information. <i>Activity:</i> Give students different types of leaves and ask them to describe the color, texture, shape, and smell (1.5 marks for def + 1.5 for activity).</li><li><b>(ii) Prediction (4 marks):</b> Making a sensible guess based on prior knowledge. <i>Activity:</i> Ask students to predict what will happen to an ice cube placed outside in the sun vs. placed in the fridge before performing the experiment (2 marks for def + 2 for activity).</li></ul>` },
    { set: 1, module: 'JSC 118', moduleClass: 'module-jsc', marks: 15, text: `2. (a) (i) What are mixtures? (ii) Briefly explain the following terms and give TWO (2) examples each: Heterogeneous mixtures, Compounds. (b) A science teacher plans a practical lesson on density. (i) Define density. (ii) Outline the procedures one would follow in a laboratory to determine the density of a liquid like petrol.`, 
    answer: `<h4>MODEL ANSWER (15 Marks)</h4><p><b>(a) (i) Mixtures (2 marks):</b><br>Mixtures are substances made up of two or more different components that are not chemically bonded and can be separated by physical means.</p><p><b>(a) (ii) Terms and Examples (6 marks):</b></p><ul><li><b>Heterogeneous Mixtures:</b> Mixtures where the components are visibly distinct and not uniform throughout. Example: Sand and water, Oil and water (3 marks).</li><li><b>Compounds:</b> Substances formed when two or more different elements chemically combine in a fixed ratio. Example: Water (H₂O), Table Salt (NaCl) (3 marks).</li></ul><p><b>(b) (i) Density (2 marks):</b><br>Density is the mass per unit volume of a substance.</p><p><b>(b) (ii) Procedures to determine Density (5 marks):</b></p><ul><li>Step 1: Measure the mass of an empty measuring cylinder using a balance.</li><li>Step 2: Pour a known volume of the liquid (petrol) into the cylinder.</li><li>Step 3: Measure the total mass of the cylinder plus the liquid.</li><li>Step 4: Subtract the mass of the empty cylinder to find the mass of the liquid.</li><li>Step 5: Use the formula: Density = Mass / Volume.</li></ul>` },
    { set: 2, module: 'JEB 115', moduleClass: 'module-jeb', marks: 15, text: `1. (a) Teachers must use observation to identify learners with diverse needs. Describe the Response to Intervention (RTI) approach used to identify students with academic needs in a classroom. (b) State and explain FOUR (4) specific strategies you will adopt to modify the behaviour of challenging learners in your classroom.`, 
    answer: `<h4>MODEL ANSWER (15 Marks)</h4><p><b>(a) Response to Intervention (RTI) Approach (6 marks):</b><br>RTI is an approach that emphasizes <b>student outcomes rather than student deficits</b> (2 marks). It provides early and immediate support for students' academic needs by screening students as early as kindergarten (2 marks). It is used to identify and provide early intervention activities so that struggling students can participate and progress in the general curriculum. If a student is not responding to traditional instruction, they are provided with additional individualized and small-group instruction using research-based strategies (2 marks).</p><p><b>(b) Four Behaviour Modification Strategies (9 marks):</b></p><ul><li><b>1. Planned Ignoring:</b> The teacher strategically ignores negative behaviours that are reinforced by peers, extinguishing them over time (2 marks).</li><li><b>2. Positive Reinforcement:</b> Pairing a positive stimulus to a behaviour, such as rewarding a student with a sticker or star for raising their hand before speaking (2.5 marks).</li><li><b>3. Token Economy (The 3x5 Card system):</b> The teacher rings a bell every 15 minutes and awards points/stars on a card to students who exhibit prescribed behaviours. Points can be exchanged for free time or desired activities (2.5 marks).</li><li><b>4. Weekly Reports to Parents:</b> Sending home positive behaviour reports emphasizes good behaviour, reinforcing not only the child's actions but also conditioning the teacher to pay attention to positive behaviour (2 marks).</li></ul>` },
    { set: 2, module: 'JEB 115', moduleClass: 'module-jeb', marks: 15, text: `2. (a) Explain the concept of the Learning Story Approach as a method of collecting data about learners. (b) Discuss the FOUR (4) main components of a learning story and explain THREE (3) benefits of using this approach in an early childhood classroom.`, 
    answer: `<h4>MODEL ANSWER (15 Marks)</h4><p><b>(a) Concept of Learning Story Approach (3 marks):</b><br>The Learning Story approach is a process where learning is structured around a narrative or story as a means of 'sense-making'. It involves using personal stories, narratives, and anecdotes to engage learners and share knowledge (3 marks).</p><p><b>(b) Four Components and Three Benefits (12 marks):</b></p><p><b>Four Components (6 marks):</b></p><ul><li>1. Descriptions of key behaviours or dispositions (1.5 marks).</li><li>2. What learning has taken place and how it relates to the child's interests (1.5 marks).</li><li>3. What steps might be taken to extend and support future learning (1.5 marks).</li><li>4. Links to the child's family context and setting learning goals (1.5 marks).</li></ul><p><b>Three Benefits (6 marks):</b></p><ul><li><b>1. Encourages Involvement:</b> It invites families and children to participate in assessment practices by engaging with the stories and helping to interpret them (2 marks).</li><li><b>2. Constructs Competence:</b> It recognizes and strengthens children's learning dispositions, identifying them as strong and capable in various roles (2 marks).</li><li><b>3. Enables Continuity:</b> It documents interconnections between stories, allowing teachers to make links backward (to previous events) and forward (to potential plans) for ongoing learning (2 marks).</li></ul>` }
];

const questionsDataChunk3 = [
    { set: 2, module: 'JED 115', moduleClass: 'module-jed', marks: 15, text: `1. (a) Describe the philosophy and main aims of Traditional (Indigenous) African Education in Ghana. (b) Discuss FOUR (4) major strengths and FOUR (4) weaknesses of the Traditional African system of education.`, 
    answer: `<h4>MODEL ANSWER (15 Marks)</h4><p><b>(a) Philosophy and Aims of Indigenous Education (6 marks):</b><br>The philosophy of traditional education is that <b>the learner is a receptacle and the teacher is the possessor of knowledge</b> (2 marks). The aim is to embrace the social, moral, spiritual, intellectual, and psychomotor development of the young ones to make them functional members of society (2 marks). Key aims include: <b>Character training</b> (honesty, courage, respect for elders), <b>Political training</b>, <b>Vocational/Economic training</b> (farming, fishing, weaving), and <b>Religious preparation</b> (2 marks).</p><p><b>(b) Strengths and Weaknesses (9 marks):</b><br><b>Strengths (4 marks):</b> It was comprehensive and holistic (developing every aspect of personality). It was cost-effective (affordable). Every adult was a teacher, so there was no shortage of teachers. It prepared every individual to be a functional member of society, minimizing unemployment (1 mark each). <br><b>Weaknesses (5 marks):</b> It was indigenous and localized—skills were not applicable outside the local environment. It was rigid and conservative, resistant to change. There was no sense of measurement or estimation (e.g., indicating distance as "just there"). There were no written figures or letters to prepare them for the outside world. It focused more on the group than the individual (1 mark each).</p>` },
    { set: 2, module: 'JED 115', moduleClass: 'module-jed', marks: 15, text: `2. (a) State the rationale for the establishment of Castle Schools along the coast of Ghana by European merchants. (b) Explain the curriculum that was offered in the Castle Schools and discuss THREE (3) major challenges these schools faced.`, 
    answer: `<h4>MODEL ANSWER (15 Marks)</h4><p><b>(a) Rationale for Castle Schools (6 marks):</b></p><ul><li><b>1. Educating Mulattoes:</b> European traders had children with African women and felt a moral obligation to give them a European-style education (1.5 marks).</li><li><b>2. Training Interpreters and Clerks:</b> The merchants needed interpreters, clerks, and trade representatives to facilitate trade and record-keeping (1.5 marks).</li><li><b>3. Spreading Christianity:</b> The schools were used as a tool for converting the local "heathen" population to Christianity (1.5 marks).</li><li><b>4. Training Sons of Chiefs:</b> They trained the sons of local chiefs and wealthy traders to help colonize and manage local people (1.5 marks).</li></ul><p><b>(b) Curriculum and Challenges (9 marks):</b></p><p><b>Curriculum (3 marks):</b> The curriculum consisted basically of the <b>3Rs</b> (Reading, Writing, and Arithmetic) and Religious Instruction. Music was sometimes added. The language of instruction was the language of the castle owners (e.g., Dutch, English) (3 marks).</p><p><b>Challenges (6 marks):</b></p><ul><li><b>1. Poor Enrolment:</b> The local people refused to send their children because they feared they would lose their cultural identity or that educated girls would not respect their uneducated husbands (2 marks).</li><li><b>2. Wars and Instability:</b> The Anglo-Dutch wars and the Asante-Fante wars created a state of insecurity along the coast, disrupting effective academic work (2 marks).</li><li><b>3. Financial Constraints:</b> Later, when Africans like Philip Quaque ran the Cape Coast Castle school, they were poorly supported financially by the authorities (2 marks).</li></ul>` },
    { set: 2, module: 'JEN 117', moduleClass: 'module-jen', marks: 15, text: `1. (a) Describe the Innatist Theory of language acquisition proposed by Noam Chomsky, paying special attention to the concept of the Language Acquisition Device (LAD). (b) Discuss THREE (3) implications of the Innatist Theory for a teacher of English as a second language.`, 
    answer: `<h4>MODEL ANSWER (15 Marks)</h4><p><b>(a) Innatist Theory and LAD (7 marks):</b><br>The Innatist theory, championed by Noam Chomsky, argues that linguistic knowledge is innate and not solely based on mechanical habits (imitation and repetition) (2 marks). Chomsky posits that there is an in-built mechanism in the mind called the <b>Language Acquisition Device (LAD)</b>, often described as an "imaginary black box" in the brain (2 marks). The LAD allows humans to discover the underlying rules of a language system within themselves (1 mark). For the LAD to work, the child needs only samples or inputs of natural language (1 mark). Because all humans have this device, they are naturally equipped to learn language (1 mark).</p><p><b>(b) Three Implications for Teachers (8 marks):</b></p><ul><li><b>1. Consider Each Child Capable:</b> The teacher must not condemn a child for being incapable of learning a language, because the presence of the LAD means every child can learn if motivated (2.5 marks).</li><li><b>2. Create the Right Atmosphere:</b> The teacher should create an atmosphere that stimulates the natural home environment where language is used unconsciously and freely without fear (2.5 marks).</li><li><b>3. Presentation According to Age/Experience:</b> The teacher must present language items according to the child's age, level of development, and experience. Teaching should move from the known (L1) to the unknown (L2) (3 marks).</li></ul>` },
    { set: 2, module: 'JEN 117', moduleClass: 'module-jen', marks: 15, text: `2. (a) Explain Halliday's Discourse Theory of language acquisition. (b) As a language teacher, how would you apply the principles of the Discourse Theory in your classroom? Discuss FOUR (4) specific teaching strategies you would adopt to encourage communication.`, 
    answer: `<h4>MODEL ANSWER (15 Marks)</h4><p><b>(a) Halliday's Discourse Theory (4 marks):</b><br>The Discourse Theory, propounded by Halliday (1975), states that learning a language is essentially using the language to communicate (1 mark). According to Halliday, language development should be based on how the learner takes part in communication to discover the meaning of language (1 mark). One can only learn a language effectively if they are able to use it to communicate with other learners (1 mark). Through communication, children fulfill actions in the world and develop the rules of language structure and use (1 mark).</p><p><b>(b) Four Teaching Strategies (11 marks):</b></p><ul><li><b>1. Motivate Communication:</b> The teacher must motivate pupils to communicate in the target language from the very first day they step into the classroom (2.5 marks).</li><li><b>2. Use Conversation as a Strategy:</b> The teacher should use storytelling, verse, and drama to create scenes where learners can role-play characters and express themselves in day-to-day scenarios (3 marks).</li><li><b>3. Use of Teaching and Learning Materials (TLMs):</b> Since children are learning a new language, the teacher must use plentiful TLMs (e.g., pictures, objects, charts) to help learners understand and use the language in appropriate situations (3 marks).</li><li><b>4. Adopt Good Communication Relationships:</b> The teacher should adopt conversation strategies by organizing debates, pair work, and group discussions among pupils to improve interaction (2.5 marks).</li></ul>` },
    { set: 2, module: 'JMC 116', moduleClass: 'module-jmc', marks: 15, text: `1. (a) Change the following numerals to base ten (10): (i) 234_5 (ii) 1011_2. (b) Convert 38_10 to a base five numeral. (c) Given that 121_x = 25_10, find the value of x.`, 
    answer: `<h4>MODEL ANSWER (15 Marks)</h4><p><b>(a) Number Base to Base Ten (5 marks):</b><br>(i) 234_5 = (2 × 5²) + (3 × 5¹) + (4 × 5⁰) = (2 × 25) + (3 × 5) + (4 × 1) = 50 + 15 + 4 = <b>69</b> (2.5 marks).<br>(ii) 1011_2 = (1 × 2³) + (0 × 2²) + (1 × 2¹) + (1 × 2⁰) = 8 + 0 + 2 + 1 = <b>11</b> (2.5 marks).</p><p><b>(b) Base Ten to Base Five (4 marks):</b><br>Divide 38 by 5: 38 ÷ 5 = 7 R3.<br>Divide 7 by 5: 7 ÷ 5 = 1 R2.<br>Divide 1 by 5: 1 ÷ 5 = 0 R1.<br>Read remainders from bottom to top: <b>123_5</b>.</p><p><b>(c) Equation in Number Base (6 marks):</b><br>Convert 121_x to base 10: (1 × x²) + (2 × x¹) + (1 × x⁰) = 25. (1 mark)<br>This simplifies to: x² + 2x + 1 = 25. (1 mark)<br>Subtract 25 from both sides: x² + 2x - 24 = 0. (1 mark)<br>Factorize: (x + 6)(x - 4) = 0. (1 mark)<br>Therefore, x = -6 or x = 4. (1 mark)<br>Since a base cannot be negative, <b>x = 4</b> (1 mark).</p>` },
    { set: 2, module: 'JMC 116', moduleClass: 'module-jmc', marks: 15, text: `2. (a) Evaluate the following modulo arithmetic operations: (i) 3 + 5 (mod 4) (ii) 6 × 5 (mod 7). (b) The function g is defined by g(x) = (2x - 1)/3. Find: (i) g(5) (ii) the inverse of g, g⁻¹(x).`, 
    answer: `<h4>MODEL ANSWER (15 Marks)</h4><p><b>(a) Modulo Arithmetic (6 marks):</b><br>(i) 3 + 5 (mod 4) = 8 (mod 4) = <b>0</b> (3 marks).<br>(ii) 6 × 5 (mod 7) = 30 (mod 7). 30 ÷ 7 = 4 remainder 2, so 30 (mod 7) = <b>2</b> (3 marks).</p><p><b>(b) Functions and Inverse (9 marks):</b><br>(i) g(5) = (2(5) - 1)/3 = (10 - 1)/3 = 9/3 = <b>3</b> (3 marks).<br>(ii) To find the inverse: Let y = (2x - 1)/3. (3 marks)<br>Multiply both sides by 3: 3y = 2x - 1. (1 mark)<br>Add 1: 3y + 1 = 2x. (1 mark)<br>Divide by 2: x = (3y + 1)/2. (1 mark)<br>Therefore, <b>g⁻¹(x) = (3x + 1)/2</b> (3 marks).</p>` }
];

const questionsDataChunk4 = [
    { set: 2, module: 'JSC 118', moduleClass: 'module-jsc', marks: 15, text: `1. (a) Copy and complete the following table based on the SI unit, its symbol, and a suitable measuring device: Mass, Electric Current, Luminous Intensity, Temperature. (b) State THREE (3) differences between an Element and a Compound.`, 
    answer: `<h4>MODEL ANSWER (15 Marks)</h4><p><b>(a) SI Unit Table (8 marks):</b><br><table border="1" style="border-collapse: collapse; width: 100%;"><tr><th>Quantity</th><th>SI Unit</th><th>Symbol</th><th>Any 1 measuring device</th></tr><tr><td>Mass</td><td>Kilogram</td><td>kg</td><td>Beam balance / Scale</td></tr><tr><td>Electric Current</td><td>Ampere</td><td>A</td><td>Ammeter</td></tr><tr><td>Luminous Intensity</td><td>Candela</td><td>cd</td><td>Photometer</td></tr><tr><td>Temperature</td><td>Kelvin</td><td>K</td><td>Thermometer</td></tr></table><br>(2 marks per correctly completed row)</p><p><b>(b) Differences between Element and Compound (7 marks):</b></p><ul><li><b>1. Composition:</b> An element contains only one type of atom, whereas a compound contains two or more different types of atoms chemically bonded together (2.5 marks).</li><li><b>2. Separation:</b> Elements cannot be broken down into simpler substances by chemical means, but compounds can be broken down into their constituent elements by chemical reactions (2.5 marks).</li><li><b>3. Properties:</b> Elements possess the properties of their individual atoms, while compounds have completely different properties from the elements that make them up (e.g., Sodium is a metal and Chlorine is a gas, but Sodium Chloride is table salt) (2 marks).</li></ul>` },
    { set: 2, module: 'JSC 118', moduleClass: 'module-jsc', marks: 15, text: `2. (a) Explain the following science process skills and provide a brief classroom activity for each: (i) Classification (ii) Inferring (iii) Measuring. (b) Explain the importance of teaching process skills to learners at the basic school level.`, 
    answer: `<h4>MODEL ANSWER (15 Marks)</h4><p><b>(a) Three Process Skills (9 marks):</b></p><ul><li><b>(i) Classification (3 marks):</b> Grouping objects or events based on common properties. <i>Activity:</i> Give students a basket of mixed fruits and ask them to sort them into groups based on color, size, or shape.</li><li><b>(ii) Inferring (3 marks):</b> Explaining an observation by drawing conclusions based on prior knowledge. <i>Activity:</i> Show students a wilted plant. Ask them to infer why it has wilted (e.g., lack of water, too much sun).</li><li><b>(iii) Measuring (3 marks):</b> Using standard or non-standard tools to quantify observations. <i>Activity:</i> Have students measure the length and width of their school desks using a ruler.</li></ul><p><b>(b) Importance of Process Skills (6 marks):</b></p><ul><li>They develop critical thinking and problem-solving abilities in learners (1.5 marks).</li><li>They provide hands-on experience, making learning more engaging and long-lasting (1.5 marks).</li><li>They help learners understand the nature of science and how scientists work (1.5 marks).</li><li>They equip learners with transferable skills applicable to real-life situations (1.5 marks).</li></ul>` },
    { set: 3, module: 'JEB 115', moduleClass: 'module-jeb', marks: 15, text: `1. (a) Explain the term 'Task Analysis' and state ONE (1) example of a task that would be "too complex" and one that is "just right" for task analysis. (b) List the SIX (6) steps involved in implementing Task Analysis to teach a learner with diverse needs.`, 
    answer: `<h4>MODEL ANSWER (15 Marks)</h4><p><b>(a) Task Analysis and Examples (4 marks):</b><br>Task analysis is the process of breaking a skill down into smaller, more manageable components to ease its performance and reduce error (2 marks).<br><b>Too complex:</b> Preparing, serving, and cleaning up dinner.<br><b>Just right:</b> Washing dishes (2 marks).</p><p><b>(b) Six Steps for Implementation (11 marks):</b></p><ul><li><b>Step 1: Identifying the Target Skill.</b> Identify the skill the learner needs to acquire based on their IEP goals (2 marks).</li><li><b>Step 2: Identifying Prerequisite Skills and Materials.</b> Determine the skills the learner already has and the materials needed to teach the task (2 marks).</li><li><b>Step 3: Breaking the Skill into Components.</b> Break the skill down into smaller steps (e.g., by completing it yourself and recording each step) (2 marks).</li><li><b>Step 4: Confirming the Task is Completely Analyzed.</b> Have someone else follow the steps to ensure all steps are included and accurate (2 marks).</li><li><b>Step 5: Determining How the Skill will be Taught.</b> Decide whether to use total task, backward, or forward chaining based on the learner's temperament and learning style (1.5 marks).</li><li><b>Step 6: Implementing Intervention and Monitoring Progress.</b> Implement the chosen evidence-based practice and follow data collection procedures to monitor the learner's progress (1.5 marks).</li></ul>` },
    { set: 3, module: 'JEB 115', moduleClass: 'module-jeb', marks: 15, text: `2. (a) Evaluation is a continuous process in education. Explain the THREE (3) major phases of evaluation. (b) Distinguish clearly between Formative Evaluation and Summative Evaluation, providing specific examples of when a teacher would use each.`, 
    answer: `<h4>MODEL ANSWER (15 Marks)</h4><p><b>(a) Three Phases of Evaluation (6 marks):</b></p><ul><li><b>1. The Planning Phase:</b> Takes place prior to implementation. It involves situation analysis, specification of objectives, specification of prerequisites, selection of measuring instruments, and a time schedule (2 marks).</li><li><b>2. The Process Phase:</b> Takes place during implementation. It involves administering pre-tests, monitoring activities, and providing feedback. It is often referred to as formative evaluation (2 marks).</li><li><b>3. The Product Phase:</b> Takes place at the end of a cycle. It focuses on the overall effectiveness of the instruction or program based on post-tests and cumulative data. It is referred to as summative evaluation (2 marks).</li></ul><p><b>(b) Formative vs. Summative Evaluation (9 marks):</b><br><b>Formative Evaluation:</b></p><ul><li><b>Purpose:</b> To provide feedback during the learning process to identify areas where the student needs improvement or where the teacher needs to adjust their methods (2 marks).</li><li><b>Timing:</b> Conducted during instruction, such as weekly tests, class quizzes, and observations (1.5 marks).</li><li><b>Example:</b> A teacher administers a short quiz after a lesson to see if students understood the concept before moving to the next topic (2 marks).</li></ul><p><b>Summative Evaluation:</b></p><ul><li><b>Purpose:</b> To assess student learning at the end of a unit or course to determine the extent to which objectives were achieved. Used for certification and grading (2 marks).</li><li><b>Timing:</b> Conducted at the end of a course, term, or year, such as final examinations and end-of-term papers (1.5 marks).</li><li><b>Example:</b> The BECE or WASSCE examinations conducted by the West African Examinations Council (2 marks).</li></ul>` },
    { set: 3, module: 'JED 115', moduleClass: 'module-jed', marks: 15, text: `1. (a) State any SIX (6) of Guggisberg's Sixteen (16) Principles of Education. (b) Explain any THREE (3) of the principles you stated and demonstrate how they are still relevant to modern education in Ghana.`, 
    answer: `<h4>MODEL ANSWER (15 Marks)</h4><p><b>(a) Guggisberg's Six Principles (6 marks):</b><br>(Any 6 valid principles are acceptable. 1 mark each).<br>1. Primary education must be thorough and from bottom to top.<br>2. Provision of secondary schools to fit young people for university.<br>3. The provision of a university.<br>4. Equal opportunities for the education of girls.<br>5. Co-education is desirable during certain stages.<br>6. The staff of teachers must be of the highest possible quality.<br>7. Character training must take an important place in education.<br>8. Religious teaching should form part of school life.</p><p><b>(b) Relevance of Three Principles (9 marks):</b></p><ul><li><b>Principle 4 - Equal Opportunities for Girls:</b> This principle is highly relevant today through the implementation of policies like FCUBE and the 'Free SHS' policy which ensure equal access to education for both boys and girls, promoting national development (3 marks).</li><li><b>Principle 6 - High-Quality Teachers:</b> This is addressed by the modern National Teaching Council (NTC) which registers qualified teachers and enforces the National Teachers' Standards to ensure only the best teachers enter the classroom (3 marks).</li><li><b>Principle 12 - English Education based on Vernacular:</b> This aligns directly with Ghana's current language policy which stipulates that the local language (L1) should be used as the medium of instruction for the first three years of primary school before transitioning to English (3 marks).</li></ul>` },
    { set: 3, module: 'JED 115', moduleClass: 'module-jed', marks: 15, text: `2. (a) Governor Rodger's 1909 Reforms introduced significant changes to colonial education. Discuss any THREE (3) major provisions recommended by the Rodger's reforms. (b) Explain the challenges that frustrated the implementation of the 1909 educational reforms.`, 
    answer: `<h4>MODEL ANSWER (15 Marks)</h4><p><b>(a) Three Provisions of Governor Rodger's Reforms (6 marks):</b></p><ul><li><b>1. End of Payment by Results:</b> Abolished the system where grants to schools depended on the number of passes made by pupils in exams; grants instead depended on overall teaching efficiency (2 marks).</li><li><b>2. Emphasis on Agriculture:</b> Introduction of agriculture into the curriculum, which led to the establishment of school farms to teach practical agricultural skills (2 marks).</li><li><b>3. Introduction of Technical Education:</b> The government took more interest in technical education to supplement the efforts of the Basel Mission, leading to the founding of the first Government Technical School in Accra in 1909 (2 marks).</li></ul><p><b>(b) Challenges Faced (9 marks):</b></p><ul><li><b>1. Lack of Funds:</b> Insufficient financial backing made it difficult to maintain the school farms and implement the reforms fully (3 marks).</li><li><b>2. Persistence of 'Parrot Learning':</b> Even though 'Payment by Results' was abolished, the new rules did not eliminate the rote learning and memorization methods that had been entrenched (3 marks).</li><li><b>3. The First World War:</b> The outbreak of WWI (1914-1919) disrupted the progress of the educational reforms (3 marks).</li></ul>` }
];

const questionsDataChunk5 = [
    { set: 3, module: 'JED 115', moduleClass: 'module-jed', marks: 15, text: `3. (a) The 1961 Education Act was the first major act passed in post-independent Ghana. List FIVE (5) of its key provisions. (b) Identify and discuss FOUR (4) major challenges that hindered the full implementation of the 1961 Education Act.`, 
    answer: `<h4>MODEL ANSWER (15 Marks)</h4><p><b>(a) Five Provisions of the 1961 Education Act (5 marks):</b></p><ul><li>1. The powers of the Minister of Education were defined to deal with matters relating to education (1 mark).</li><li>2. Compulsory and fee-free basic education for all children of school-going age (1 mark).</li><li>3. Basic education was structured into two stages: 6 years primary and 4 years middle school (1 mark).</li><li>4. Institution of terms and conditions of service for teachers (1 mark).</li><li>5. The establishment of Boards of Governors for all non-government secondary schools and teacher training colleges (1 mark).</li></ul><p><b>(b) Four Challenges Hindering Implementation (10 marks):</b></p><ul><li><b>1. Inadequate Financial Resources:</b> The government lacked the necessary funds to meet the great demand for infrastructure and other resources to support the massive influx of students (2.5 marks).</li><li><b>2. Shortage of Trained Teachers:</b> The sharp increase in pupil enrolment was not matched by the corresponding training and recruitment of adequate teachers for the classroom (2.5 marks).</li><li><b>3. Rural-Urban Teacher Disparity:</b> Rural schools suffered from a severe lack of teachers as trained teachers preferred postings to urban schools (2.5 marks).</li><li><b>4. Church Interference Complaints:</b> The churches complained about interference by the Minister of Education in the running of their schools (2.5 marks).</li></ul>` },
    { set: 3, module: 'JED 115', moduleClass: 'module-jed', marks: 15, text: `4. (a) Explain the rationale for changing the teacher education programme from a 3-year Diploma to a new 4-year Bachelor of Education (B.Ed.) degree. (b) Describe the FOUR (4) pillars of the new teacher education curriculum.`, 
    answer: `<h4>MODEL ANSWER (15 Marks)</h4><p><b>(a) Rationale for the 4-Year B.Ed. (6 marks):</b><br>The primary rationale is to raise the status of the teaching profession and make it more attractive to new entrants (1.5 marks). It aims to improve the quality of teachers by ensuring they undergo a rigorous and practically-focused, high-quality degree-level programme (1.5 marks). It intends to develop teachers who can integrate subject and pedagogical knowledge and use differentiated instruction to improve learning outcomes for all learners (1.5 marks). Ultimately, it seeks to train teachers with professional skills, values, and the spirit of enquiry, innovation, and creativity to adapt to changing conditions (1.5 marks).</p><p><b>(b) The Four Pillars of the Curriculum (9 marks):</b></p><ul><li><b>1. Subject and Curriculum Knowledge:</b> Focuses on secure, subject-specific content and pedagogical knowledge needed to teach the school curriculum (2.5 marks).</li><li><b>2. Literacy Studies (Ghanaian Languages and English):</b> Focuses on early-grade literacy in L1 and L2, as language is the key to accessing the curriculum (2 marks).</li><li><b>3. Pedagogic Knowledge:</b> Focuses on general pedagogic knowledge, assessment strategies, cross-cutting issues (ICT, SEN, Inclusion), and classroom enquiry/research (2.5 marks).</li><li><b>4. Supported Teaching in School (STS):</b> Student teachers spend 30% of their training in the field, mentored and assessed on the National Teachers' Standards (2 marks).</li></ul>` },
    { set: 3, module: 'JED 115', moduleClass: 'module-jed', marks: 15, text: `5. (a) Distinguish clearly between a Vertical Career Path and a Horizontal Career Path in the context of the teaching profession. (b) Explain FOUR (4) factors a student teacher should consider when choosing a career path.`, 
    answer: `<h4>MODEL ANSWER (15 Marks)</h4><p><b>(a) Vertical vs. Horizontal Career Path (6 marks):</b><br><b>Vertical Career Path:</b> Involves vertical growth or advancement to higher-level positions within the same field, such as being promoted from Teacher to Senior Teacher, to Headmaster, and finally to Director of Education (3 marks).<br><b>Horizontal Career Path:</b> Involves lateral movement within or across industries to increase knowledge and skills, such as transferring from a classroom teaching role to a curriculum development role, or from teaching to teacher training at a College of Education (3 marks).</p><p><b>(b) Four Factors to Consider when Choosing a Career Path (9 marks):</b></p><ul><li><b>1. Interests:</b> Take inventory of what you enjoy doing and compare it to past work to identify key skills for a new career (2.5 marks).</li><li><b>2. Skills and Talents:</b> Evaluate your unique talents (whether innate or acquired) to match them with specific career paths (2 marks).</li><li><b>3. Work Attitudes:</b> Consider how your attitude affects career types, such as a desire for independence, high earnings, or working with specific groups of people (2.5 marks).</li><li><b>4. Training and Education:</b> Determine the level of training and education required for the career and ensure it is within your means to achieve (2 marks).</li></ul>` },
    { set: 3, module: 'JEN 117', moduleClass: 'module-jen', marks: 15, text: `1. (a) Explain the Cognitivist Theory of language acquisition, highlighting the role of error analysis in this approach. (b) Discuss THREE (3) implications of the Cognitivist Theory for teaching English as a Second Language (L2).`, 
    answer: `<h4>MODEL ANSWER (15 Marks)</h4><p><b>(a) Cognitivist Theory (6 marks):</b><br>The Cognitivist theory posits that learners use their cognitive abilities in a creative way to work out hypotheses about the structure of the L2. Language is related to the child's intellectual development (2 marks). In learning a language, children construct rules, try them out, and change them if proven inadequate. Language learning proceeds in a series of transitional stages as learners acquire more knowledge of the L2 (2 marks). <b>Error analysis plays a central role</b> because errors provide positive evidence about the nature of the learning process (2 marks).</p><p><b>(b) Three Implications for Teachers (9 marks):</b></p><ul><li><b>1. Teaching in Transitional Stages:</b> Teachers should structure lessons in transitional stages so that the child becomes conversant with the language they are learning step-by-step (3 marks).</li><li><b>2. Plan for Different Abilities:</b> The teacher should recognize that every child is different in intelligence, aptitude, and experience, so lessons must be planned to suit all levels in the classroom (3 marks).</li><li><b>3. Use of Natural Situations:</b> Teachers should use L2 in near-natural situations to help pupils learn language naturally despite difficulties. This helps prevent the formation of incorrect habits and aids in error correction (3 marks).</li></ul>` },
    { set: 3, module: 'JEN 117', moduleClass: 'module-jen', marks: 15, text: `2. (a) Stephen Krashen's Monitor Model is based on five hypotheses. Explain any FOUR (4) of these hypotheses. (b) Identify and explain the FOUR (4) main stages of Second Language (L2) Acquisition that learners go through (from Pre-production to Advanced Fluency).`, 
    answer: `<h4>MODEL ANSWER (15 Marks)</h4><p><b>(a) Four Hypotheses of Krashen's Monitor Model (8 marks):</b></p><ul><li><b>1. The Acquisition-Learning Hypothesis:</b> Differentiates between 'acquisition' (subconscious, natural interaction) and 'learning' (conscious, formal study of rules) (2 marks).</li><li><b>2. The Input Hypothesis:</b> States that language acquisition happens through Comprehensible Input (CI), which is input slightly above the learner's current competence (i + 1) (2 marks).</li><li><b>3. The Affective Filter Hypothesis:</b> Suggests that low motivation, anxiety, and lack of confidence act as a 'filter' that blocks comprehension input from being acquired (2 marks).</li><li><b>4. The Natural Order Hypothesis:</b> Claims that language rules are acquired in a predictable, natural order, regardless of how they are taught in the classroom (2 marks).</li></ul><p><b>(b) Four Stages of L2 Acquisition (7 marks):</b></p><ul><li><b>1. Pre-Production Stage:</b> The 'silent period'. Learners have a receptive vocabulary of up to 500 words but do not speak yet (1.5 marks).</li><li><b>2. Early Production Stage:</b> Learners develop a vocabulary of about 1,000 words and can speak in one- or two-word phrases (1.5 marks).</li><li><b>3. Speech Emergence Stage:</b> Learners have about 3,000 words and can communicate using simple phrases and sentences (2 marks).</li><li><b>4. Intermediate Fluency Stage:</b> Learners have about 6,000 active words. They use complex sentences and express opinions. They make errors as they master complex grammar (2 marks).</li></ul>` },
    { set: 3, module: 'JEN 117', moduleClass: 'module-jen', marks: 15, text: `3. (a) Distinguish clearly between the concepts of Language and Literacy. (b) Explain Stephen Krashen's Acquisition-Learning Hypothesis. How does the 'acquisition' of a language differ from the 'learning' of a language?`, 
    answer: `<h4>MODEL ANSWER (15 Marks)</h4><p><b>(a) Language vs. Literacy (5 marks):</b><br><b>Language:</b> A universal tool for sharing information and expressing thoughts and feelings. It is acquired naturally from caregivers, parents, and siblings and is available to everyone (2.5 marks).<br><b>Literacy:</b> The ability to read and write (conventional literacy). It is artificially learnt in organized settings such as the classroom and helps in participating in social media, employment, and civic obligations (2.5 marks).</p><p><b>(b) Acquisition-Learning Hypothesis (10 marks):</b><br>According to Krashen, adults have two distinct ways to develop knowledge of a second language: 'learning' and 'acquisition' (2 marks).<br><b>Acquisition</b> is a subconscious process when a learner is engaged in meaningful communication and the focus is on meaning (2 marks). It is the result of natural interaction with the language (2 marks). It allows the learner to use the language spontaneously (2 marks).<br><b>Learning</b> is a conscious process with attention to form and error correction (2 marks). It refers to the formal study of language rules and is the result of classroom focus where the learner studies the linguistic rules of the target language (2 marks).</p>` }
];

const questionsDataChunk6 = [
    { set: 3, module: 'JEN 117', moduleClass: 'module-jen', marks: 15, text: `4. (a) Define Bilingual Education and distinguish between Additive Bilingualism and Subtractive Bilingualism. (b) Discuss the Cognitive Benefits of bilingual education and list THREE (3) common criticisms leveled against bilingual education.`, 
    answer: `<h4>MODEL ANSWER (15 Marks)</h4><p><b>(a) Bilingual Education and Types (6 marks):</b><br>Bilingual education is the situation where two languages are used within the same school, either at a particular time, in varying amounts of time, or used concurrently as the medium of instruction (2 marks).<br><b>Additive Bilingualism:</b> Students maintain their minority language (L1) while acquiring the L2. They do not lose their L1 in the process (2 marks).<br><b>Subtractive Bilingualism:</b> Students lose their minority language or L1 in the process of acquiring the L2 (2 marks).</p><p><b>(b) Cognitive Benefits and Criticisms (9 marks):</b></p><p><b>Cognitive Benefits (3 marks):</b></p><ul><li>Bilinguals have a more flexible view of the world and are more versatile in processing information (Cognitive flexibility) (1 mark).</li><li>Bilingual children perform better on naming and sentence construction tasks (Linguistic and metalinguistic abilities) (1 mark).</li><li>Bilinguals are more creative and deal with complex problems effectively (Divergent thinking) (1 mark).</li></ul><p><b>Three Criticisms (6 marks):</b></p><ul><li><b>1. Hindrance to Learning English:</b> It is said that bilingual education hinders learning in English and is detrimental to children's short-term and long-term academic achievement (2 marks).</li><li><b>2. Impediment to National Integration:</b> Bambose argues that many languages in a society impede national integration and that differences between indigenous languages keep the people apart (2 marks).</li><li><b>3. Financial Burden:</b> Crawford (1998) sees bilingual education as costly and a drain on government finances (2 marks).</li></ul>` },
    { set: 3, module: 'JMC 116', moduleClass: 'module-jmc', marks: 15, text: `1. (a) Find the Highest Common Factor (HCF) and the Lowest Common Multiple (LCM) of 18, 24, and 36 using prime factorization. (b) If 10 men can build a wall in 8 days, how many days will it take 16 men working at the same rate to build the same wall?`, 
    answer: `<h4>MODEL ANSWER (15 Marks)</h4><p><b>(a) HCF and LCM using Prime Factorization (6 marks):</b><br>Prime factorizations:<br>18 = 2 × 3²<br>24 = 2³ × 3<br>36 = 2² × 3²<br><b>HCF:</b> Take the lowest power of common prime factors. 2¹ × 3¹ = <b>6</b> (3 marks).<br><b>LCM:</b> Take the highest power of all prime factors present. 2³ × 3² = 8 × 9 = <b>72</b> (3 marks).</p><p><b>(b) Indirect/Inverse Proportion (5 marks):</b><br>This is an indirect proportion problem because as the number of men increases, the days required decrease.<br>Set up the proportion: 10 men / 16 men = \( x \) days / 8 days.<br>Because it's inverse, cross-multiply: 10 × 8 = 16 × \( x \).<br>80 = 16x. Divide both sides by 16: <b>\( x = 5 \) days</b>.</p>` },
    { set: 3, module: 'JMC 116', moduleClass: 'module-jmc', marks: 15, text: `2. (a) Factorize the following expressions completely using the Difference of Two Squares method: (i) x² - 49 (ii) 9y² - 25 (iii) 75u² - 147. (b) Draw the graph of the linear equation y = 3x - 2 for values of x from -1 to 3.`, 
    answer: `<h4>MODEL ANSWER (15 Marks)</h4><p><b>(a) Difference of Two Squares (7 marks):</b><br>(i) x² - 49 = (x)² - (7)² = <b>(x + 7)(x - 7)</b> (2 marks).<br>(ii) 9y² - 25 = (3y)² - (5)² = <b>(3y + 5)(3y - 5)</b> (2 marks).<br>(iii) 75u² - 147 = 3(25u² - 49) = 3[(5u)² - (7)²] = <b>3(5u + 7)(5u - 7)</b> (3 marks).</p><p><b>(b) Graph of Linear Equation (8 marks):</b><br>(1) Table of values: (4 marks)<br>x = -1 → y = -5; x = 0 → y = -2; x = 1 → y = 1; x = 2 → y = 4; x = 3 → y = 7.<br>(2) Plot the points (-1,-5), (0,-2), (1,1), (2,4), (3,7) on the graph paper. (2 marks)<br>(3) Draw a straight line through all the plotted points. (2 marks)</p>` },
    { set: 3, module: 'JSC 118', moduleClass: 'module-jsc', marks: 15, text: `1. (a) Distinguish between a Physical Change and a Chemical Change, giving two examples of each. (b) A student heats a mixture of iron filings and sulfur powder. Describe the physical properties of the mixture before heating and the chemical properties of the compound formed after heating.`, 
    answer: `<h4>MODEL ANSWER (15 Marks)</h4><p><b>(a) Physical vs. Chemical Change (6 marks):</b><br><b>Physical Change:</b> A change where the substance's physical state changes but its chemical composition remains the same. It is usually reversible. <i>Examples:</i> Melting of ice, boiling of water (3 marks).<br><b>Chemical Change:</b> A change where a new substance with entirely new chemical properties is formed. It is usually irreversible. <i>Examples:</i> Rusting of iron, burning of wood (3 marks).</p><p><b>(b) Mixture vs. Compound Properties (9 marks):</b><br><b>Before heating (Physical properties of the mixture):</b> The mixture consists of grey iron filings and yellow sulfur powder that can be easily separated using a magnet. It is a physical mixture (3 marks).<br><b>After heating (Chemical properties of the compound):</b> When heated, the iron and sulfur chemically combine to form Iron(II) sulfide, a black, hard solid with completely different properties. It cannot be separated using a magnet, and it has a distinct smell (6 marks).</p>` },
    { set: 3, module: 'JSC 118', moduleClass: 'module-jsc', marks: 15, text: `2. (a) Explain the three methods of heat transfer: Conduction, Convection, and Radiation. (b) A metal rod feels much colder than a wooden rod in the same room at the same temperature. Explain this scientific phenomenon based on your knowledge of heat transfer.`, 
    answer: `<h4>MODEL ANSWER (15 Marks)</h4><p><b>(a) Three Methods of Heat Transfer (9 marks):</b><br><b>1. Conduction:</b> The transfer of heat through a material without the material itself moving. Occurs primarily in solids. Example: Heat moving along a metal spoon from hot soup to your hand (3 marks).<br><b>2. Convection:</b> The transfer of heat through the movement of fluids (liquids or gases). Hot fluid rises, cold fluid sinks. Example: Convection currents boiling water in a pot (3 marks).<br><b>3. Radiation:</b> The transfer of heat through electromagnetic waves. It does not require a medium. Example: Heat from the sun reaching the earth (3 marks).</p><p><b>(b) Why Metal Feels Colder (6 marks):</b><br>The phenomenon is explained by <b>Conduction</b> (2 marks). Metal is a much better conductor of heat than wood (2 marks). When you touch the metal rod, it rapidly conducts heat away from your hand into the rod, so your hand feels the drop in temperature immediately. Wood is a poor conductor, so it transfers heat away from your hand very slowly, making it feel warmer relative to the metal (2 marks).</p>` }
];

const questionsData = [

        // ==========================================
        // APPLICATION LOGIC
        // ==========================================

        const container = document.getElementById('question-container');
        const setTabs = document.querySelectorAll('.set-btn');
        let currentSet = '1';

        // Filter and Render Questions
        function renderQuestions(setId) {
            let filteredQuestions = questionsData.filter(q => q.set === parseInt(setId));
            
            // Group by Module
            filteredQuestions.sort((a, b) => a.module.localeCompare(b.module));

            if (filteredQuestions.length === 0) {
                container.innerHTML = `<div class="empty-state">No questions available for this set. <br> Please add your question data to the 6 chunks in the &lt;script&gt; tag.</div>`;
                return;
            }

            // Run the Math & Science Migration on Question Text and Answers
            filteredQuestions = filteredQuestions.map(q => {
                q.text = migrateMath(q.text);
                q.answer = migrateMath(q.answer);
                return q;
            });

            container.innerHTML = filteredQuestions.map(q => `
                <div class="q-card ${q.moduleClass}" onclick="toggleAnswer(this)">
                    <div class="q-header">
                        <div class="q-info">
                            <div class="q-module">${q.module}</div>
                            <div class="q-text">${q.text}</div>
                        </div>
                        <div class="q-marks">${q.marks} Marks</div>
                        <div class="q-indicator">▼</div>
                    </div>
                    <div class="q-answer">
                        ${q.answer}
                    </div>
                </div>
            `).join('');

            // Render math and science formulas using KaTeX
            if (window.renderMathInElement) {
                renderMathInElement(document.body, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '\\(', right: '\\)', display: false},
                        {left: '\\[', right: '\\]', display: true}
                    ],
                    throwOnError : false
                });
            }
        }

        // Toggle Answer Function
        window.toggleAnswer = function(element) {
            const isOpen = element.classList.contains('open');
            // Close all open cards
            document.querySelectorAll('.q-card.open').forEach(card => {
                card.classList.remove('open');
            });
            // If it wasn't open before, open it now.
            if (!isOpen) {
                element.classList.add('open');
            }
        };

        // Set Navigation Logic
        setTabs.forEach(btn => {
            btn.addEventListener('click', function() {
                setTabs.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentSet = this.getAttribute('data-set');
                renderQuestions(currentSet);
            });
        });

        // Initial Load
        renderQuestions(1);
    </script>
