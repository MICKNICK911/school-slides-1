<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B.Ed Complete Exam Q&A Revision App</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        /* ================= LIGHT MODE ================= */
        :root {
            --bg-color: #f7fafc;
            --header-color: #1a365d;
            --text-color: #2d3748;
            --secondary-text: #718096;
            --card-bg: #ffffff;
            --card-shadow: 0 4px 6px rgba(0,0,0,0.1);
            --border-color: #e2e8f0;
            --mark-bg: #edf2f7;
            --btn-bg: #e2e8f0;
            --btn-text: #4a5568;
            --btn-active: #1a365d;
            --btn-active-text: #ffffff;
            --answer-bg: #f7fafc;
            --accent-color: #3182ce;
            --input-bg: #ffffff;
            --input-border: #cbd5e0;
        }
        /* ================= DARK MODE ================= */
        body.dark-mode {
            --bg-color: #1a202c;
            --header-color: #e2e8f0;
            --text-color: #e2e8f0;
            --secondary-text: #a0aec0;
            --card-bg: #2d3748;
            --card-shadow: 0 4px 6px rgba(0,0,0,0.5);
            --border-color: #4a5568;
            --mark-bg: #4a5568;
            --btn-bg: #4a5568;
            --btn-text: #e2e8f0;
            --btn-active: #3182ce;
            --btn-active-text: #ffffff;
            --answer-bg: #1a202c;
            --accent-color: #63b3ed;
            --input-bg: #2d3748;
            --input-border: #4a5568;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            padding-bottom: 50px;
            transition: background-color 0.3s, color 0.3s;
        }
        .header { text-align: center; margin-bottom: 25px; position: relative; }
        .header h1 { color: var(--header-color); font-size: 1.8rem; margin-bottom: 5px; }
        .header p { color: var(--secondary-text); font-size: 1rem; margin-bottom: 10px; }
        .theme-toggle {
            position: absolute; top: 0; right: 0;
            background: var(--btn-bg); color: var(--btn-text);
            border: none; padding: 8px 12px; border-radius: 50px;
            font-size: 1.2rem; cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            box-shadow: var(--card-shadow);
        }
        .theme-toggle:hover { transform: scale(1.05); }

        .search-container { max-width: 800px; margin: 0 auto 20px auto; }
        .search-container input {
            width: 100%; padding: 12px 20px; border-radius: 50px;
            border: 2px solid var(--input-border);
            background: var(--input-bg); color: var(--text-color);
            font-size: 1rem; outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            box-sizing: border-box;
        }
        .search-container input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.2);
        }

        .module-tabs {
            display: flex; justify-content: center; gap: 15px;
            margin-bottom: 25px; flex-wrap: wrap;
        }
        .module-btn {
            background: var(--btn-bg); color: var(--btn-text);
            border: none; padding: 12px 25px; border-radius: 50px;
            font-weight: bold; font-size: 1rem; cursor: pointer;
            transition: 0.3s;
        }
        .module-btn:hover { opacity: 0.9; }
        .module-btn.active {
            background: var(--btn-active); color: var(--btn-active-text);
            box-shadow: 0 4px 12px rgba(49, 130, 206, 0.3);
        }

        #question-container { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }

        .q-card {
            background: var(--card-bg); border-radius: 10px;
            box-shadow: var(--card-shadow); overflow: hidden;
            border-left: 5px solid #a0aec0;
            transition: background 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        .q-card.module-jeb { border-color: #e53e3e; }
        .q-card.module-jed { border-color: #d69e2e; }
        .q-card.module-jen { border-color: #38a169; }
        .q-card.module-jmc { border-color: #3182ce; }
        .q-card.module-jsc { border-color: #805ad5; }

        .q-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: flex-start; gap: 15px; }
        .q-info { flex: 1; }
        .q-module { font-size: 0.75rem; font-weight: bold; color: var(--secondary-text); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
        .q-text { font-size: 1.05rem; font-weight: 500; line-height: 1.5; word-break: break-word; }
        .q-marks { background: var(--mark-bg); color: var(--text-color); padding: 4px 10px; border-radius: 15px; font-size: 0.85rem; font-weight: bold; white-space: nowrap; }
        .q-indicator { color: var(--secondary-text); font-size: 1.2rem; transition: transform 0.3s; }
        .q-card.open .q-indicator { transform: rotate(180deg); }

        .q-answer {
            max-height: 0; overflow: hidden;
            transition: max-height 0.4s ease-in-out, padding 0.3s, background 0.3s;
            padding: 0 20px; background: var(--answer-bg);
            border-top: 1px solid var(--border-color);
        }
        .q-card.open .q-answer {
            padding: 20px;
        }
        .q-answer h4 { color: var(--accent-color); margin: 0 0 10px 0; font-size: 1rem; }
        .q-answer p, .q-answer ul, .q-answer table { margin: 5px 0; line-height: 1.6; font-size: 0.95rem; }
        .q-answer ul { padding-left: 20px; }
        .q-answer b { color: var(--header-color); }
        .q-answer table { border-collapse: collapse; width: 100%; margin: 10px 0; }
        .q-answer table th, .q-answer table td { border: 1px solid var(--border-color); padding: 8px; text-align: left; }
        .q-answer table th { background: var(--mark-bg); }

        .empty-state { text-align: center; color: var(--secondary-text); padding: 40px; }
        .loading-state { text-align: center; color: var(--secondary-text); padding: 40px; font-size: 1.2rem; }

        @media (max-width: 600px) {
            .header h1 { font-size: 1.4rem; }
            .theme-toggle { top: 5px; right: 0px; font-size: 1rem; padding: 6px 10px; }
            .module-btn { padding: 8px 18px; font-size: 0.9rem; }
            .q-text { font-size: 0.95rem; }
            .q-answer ul { padding-left: 15px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>📚 B.Ed Complete Revision</h1>
        <p>Tap any question to reveal the Model Answer</p>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle Dark Mode">🌙</button>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search by keyword or phrase..." aria-label="Search questions">
    </div>

    <nav class="module-tabs" id="moduleTabs" role="tablist">
        <!-- Tabs will be injected dynamically -->
    </nav>

    <div id="question-container">
        <div class="loading-state">Loading modules...</div>
    </div>

    <script>
        // ==========================================
        // MATH FORMATTER
        // ==========================================
        function migrateMath(text) {
            const wrap = (str) => `\\( ${str} \\)`;
            text = text.replace(/(\d+)\/(\d+)/g, (match, num, den) => wrap(`\\frac{${num}}{${den}}`));
            text = text.replace(/sqrt\(([^)]+)\)/g, (match, contents) => wrap(`\\sqrt{${contents}}`));
            text = text.replace(/([a-zA-Z])\^(\{?\d+\}?)/g, (match, base, power) => wrap(`${base}^{${power}}`));
            text = text.replace(/([a-zA-Z])_(\d+)/g, (match, base, subscript) => wrap(`${base}_{${subscript}}`));
            text = text.replace(/fog(?![a-zA-Z])/g, wrap(`f \\circ g`));
            text = text.replace(/gof(?![a-zA-Z])/g, wrap(`g \\circ f`));
            text = text.replace(/÷/g, wrap(`\\div`));
            text = text.replace(/([A-Z][a-z]?)(\d+)([A-Z]?)/g, (match, element, num, next) => {
                if (next) return `${element}_{${num}}${next}`;
                return `${element}_{${num}}`;
            });
            text = text.replace(/(\d+)°([C|F])/g, (match, num, unit) => wrap(`${num}^{\\circ}${unit}`));
            text = text.replace(/([a-zA-Z])2\b/g, (match, unit) => wrap(`${unit}^2`));
            text = text.replace(/([a-zA-Z])3\b/g, (match, unit) => wrap(`${unit}^3`));
            return text;
        }

        // ==========================================
        // STATE
        // ==========================================
        const container = document.getElementById('question-container');
        const searchInput = document.getElementById('searchInput');
        const moduleTabsContainer = document.getElementById('moduleTabs');
        const themeToggle = document.getElementById('themeToggle');

        let modules = [];
        let questionsData = {};
        let activeModuleId = localStorage.getItem('activeModuleId') || null;
        let allDataLoaded = false;

        // ==========================================
        // LOAD DATA
        // ==========================================
        async function loadAllData() {
            try {
                const manifestRes = await fetch('data/th-quiz/th-manifest.json');
                if (!manifestRes.ok) throw new Error('Failed to load manifest.json');
                const manifest = await manifestRes.json();
                modules = manifest.modules || [];
                if (modules.length === 0) throw new Error('No modules defined.');

                const fetchPromises = modules.map(async (mod) => {
                    const res = await fetch(mod.file);
                    if (!res.ok) throw new Error(`Failed to load ${mod.file}`);
                    const data = await res.json();
                    // Ensure each question has moduleClass (fallback if missing)
                    data.forEach(q => {
                        if (!q.moduleClass) {
                            // generate a class from module code, e.g. "JEB 115" -> "module-jeb"
                            const codePart = q.module.split(' ')[0].toLowerCase();
                            q.moduleClass = 'module-' + codePart;
                        }
                    });
                    questionsData[mod.id] = data;
                });
                await Promise.all(fetchPromises);
                allDataLoaded = true;

                renderTabs();
                if (!activeModuleId || !questionsData[activeModuleId]) {
                    activeModuleId = modules[0].id;
                    localStorage.setItem('activeModuleId', activeModuleId);
                }
                setActiveTab(activeModuleId);
                renderQuestions(activeModuleId, searchInput.value);

            } catch (error) {
                container.innerHTML = `<div class="empty-state">Error loading data: ${error.message}</div>`;
                console.error(error);
            }
        }

        // ==========================================
        // RENDER TABS
        // ==========================================
        function renderTabs() {
            moduleTabsContainer.innerHTML = '';
            modules.forEach((mod) => {
                const btn = document.createElement('button');
                btn.className = 'module-btn';
                btn.setAttribute('role', 'tab');
                btn.setAttribute('data-module-id', mod.id);
                btn.textContent = mod.code;
                if (mod.id === activeModuleId) {
                    btn.classList.add('active');
                    btn.setAttribute('aria-selected', 'true');
                } else {
                    btn.setAttribute('aria-selected', 'false');
                }
                btn.addEventListener('click', () => {
                    activeModuleId = mod.id;
                    localStorage.setItem('activeModuleId', activeModuleId);
                    setActiveTab(activeModuleId);
                    renderQuestions(activeModuleId, searchInput.value);
                });
                moduleTabsContainer.appendChild(btn);
            });
        }

        function setActiveTab(moduleId) {
            document.querySelectorAll('.module-btn').forEach(btn => {
                const id = btn.getAttribute('data-module-id');
                if (id === moduleId) {
                    btn.classList.add('active');
                    btn.setAttribute('aria-selected', 'true');
                } else {
                    btn.classList.remove('active');
                    btn.setAttribute('aria-selected', 'false');
                }
            });
        }

        // ==========================================
        // RENDER QUESTIONS
        // ==========================================
        function renderQuestions(moduleId, searchTerm = '') {
            if (!allDataLoaded || !questionsData[moduleId]) {
                container.innerHTML = `<div class="loading-state">Loading questions...</div>`;
                return;
            }
            let qs = questionsData[moduleId];
            if (searchTerm.trim() !== '') {
                const lower = searchTerm.toLowerCase();
                qs = qs.filter(q => 
                    q.text.toLowerCase().includes(lower) ||
                    q.module.toLowerCase().includes(lower)
                );
            }
            if (qs.length === 0) {
                container.innerHTML = `<div class="empty-state">No questions found.</div>`;
                return;
            }
            qs = qs.map(q => {
                q.text = migrateMath(q.text);
                q.answer = migrateMath(q.answer);
                return q;
            });
            container.innerHTML = qs.map(q => `
                <div class="q-card ${q.moduleClass}" role="button" tabindex="0" aria-expanded="false">
                    <div class="q-header">
                        <div class="q-info">
                            <div class="q-module">${q.module}</div>
                            <div class="q-text">${q.text}</div>
                        </div>
                        <div class="q-marks">${q.marks} Marks</div>
                        <div class="q-indicator">▼</div>
                    </div>
                    <div class="q-answer">${q.answer}</div>
                </div>
            `).join('');

            if (window.renderMathInElement) {
                renderMathInElement(document.body, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '\\(', right: '\\)', display: false},
                        {left: '\\[', right: '\\]', display: true}
                    ],
                    throwOnError : false
                });
            }
        }

        // ==========================================
        // CARD TOGGLE
        // ==========================================
        container.addEventListener('click', (e) => {
            const card = e.target.closest('.q-card');
            if (card) toggleCard(card);
        });
        container.addEventListener('keydown', (e) => {
            const card = e.target.closest('.q-card');
            if (card && (e.key === 'Enter' || e.key === ' ')) {
                e.preventDefault();
                toggleCard(card);
            }
        });
        function toggleCard(card) {
            const isOpen = card.classList.contains('open');
            document.querySelectorAll('.q-card').forEach(c => {
                c.classList.remove('open');
                c.setAttribute('aria-expanded', 'false');
                const ans = c.querySelector('.q-answer');
                if (ans) ans.style.maxHeight = '0px';
            });
            if (!isOpen) {
                card.classList.add('open');
                card.setAttribute('aria-expanded', 'true');
                const answer = card.querySelector('.q-answer');
                answer.style.maxHeight = answer.scrollHeight + 'px';
            }
        }

        // ==========================================
        // SEARCH
        // ==========================================
        searchInput.addEventListener('input', (e) => {
            if (activeModuleId) renderQuestions(activeModuleId, e.target.value);
        });

        // ==========================================
        // THEME
        // ==========================================
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            themeToggle.textContent = '☀️';
        }
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const theme = document.body.classList.contains('dark-mode') ? 'dark' : 'light';
            localStorage.setItem('theme', theme);
            themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
        });

        // ==========================================
        // START
        // ==========================================
        loadAllData();
    </script>
</body>
</html>
