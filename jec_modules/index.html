<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>B.Ed Module Viewer</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <style>
        /* ============================
           CSS VARIABLES (Light/Dark) – SAME AS BEFORE
           ============================ */
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --surface-2: #f1f5f9;
            --text: #0f172a;
            --text-secondary: #475569;
            --border: #e2e8f0;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            --radius: 10px;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --hover-bg: #e2e8f0;
            --header-height: 60px;
            --sidebar-width: 320px;
        }

        body.dark-mode {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-2: #334155;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            --hover-bg: #334155;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
        }

        /* ============================
           RESET & BASE – SAME AS BEFORE
           ============================ */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            height: 100vh;
            overflow: hidden;
        }
        button {
            font: inherit;
            cursor: pointer;
            background: none;
            border: none;
            color: inherit;
            touch-action: manipulation;
        }

        /* ============================
           LAYOUT – IDENTICAL TO PREVIOUS VERSION
           ============================ */
        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        #topbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 16px;
            height: var(--header-height);
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            z-index: 100;
            transition: background 0.3s, border-color 0.3s;
        }
        #topbar .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        #topbar .brand small {
            font-weight: 400;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-left: 4px;
        }
        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }
        .topbar-actions button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            background: transparent;
            transition: background 0.2s;
        }
        .topbar-actions button:hover,
        .topbar-actions button:active {
            background: var(--hover-bg);
        }

        #hamburger {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5rem;
            background: transparent;
            flex-shrink: 0;
            transition: background 0.2s;
        }
        #hamburger:active {
            background: var(--hover-bg);
        }

        #module-selector {
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            max-width: 160px;
            cursor: pointer;
            outline: none;
            transition: background 0.3s, border-color 0.3s;
        }
        #module-selector:focus {
            border-color: var(--accent);
        }

        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 150;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }
        #overlay.active {
            display: block;
            opacity: 1;
        }

        #sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 85%;
            max-width: var(--sidebar-width);
            height: 100%;
            background: var(--surface);
            border-right: 1px solid var(--border);
            z-index: 200;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        #sidebar.open {
            transform: translateX(0);
        }

        #sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 16px 12px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        #sidebar-header h2 {
            font-size: 1rem;
            font-weight: 600;
        }
        #sidebar-close {
            font-size: 1.5rem;
            padding: 4px 8px;
            border-radius: 6px;
        }
        #sidebar-close:active {
            background: var(--hover-bg);
        }

        #search-box {
            margin: 12px 16px;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 0.95rem;
            width: calc(100% - 32px);
            flex-shrink: 0;
            transition: border-color 0.2s, background 0.3s;
            outline: none;
        }
        #search-box:focus {
            border-color: var(--accent);
        }
        #search-box::placeholder {
            color: var(--text-secondary);
        }

        #nav-tree {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px 20px 12px;
            -webkit-overflow-scrolling: touch;
        }
        #nav-tree .unit {
            margin-top: 8px;
            border-radius: 6px;
            overflow: hidden;
        }
        #nav-tree .unit summary {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            font-weight: 600;
            font-size: 0.9rem;
            border-radius: 6px;
            cursor: pointer;
            list-style: none;
            min-height: 44px;
            touch-action: manipulation;
            background: var(--surface-2);
            transition: background 0.2s;
        }
        #nav-tree .unit summary::-webkit-details-marker {
            display: none;
        }
        #nav-tree .unit summary::before {
            content: '▶';
            font-size: 0.7rem;
            margin-right: 10px;
            transition: transform 0.2s;
            color: var(--text-secondary);
        }
        #nav-tree .unit[open] summary::before {
            transform: rotate(90deg);
        }
        #nav-tree .unit summary:active {
            background: var(--hover-bg);
        }

        #nav-tree .session-list {
            padding: 4px 0 4px 16px;
            margin: 0;
            list-style: none;
        }
        #nav-tree .session-list li {
            padding: 10px 12px;
            font-size: 0.9rem;
            border-radius: 6px;
            cursor: pointer;
            min-height: 44px;
            display: flex;
            align-items: center;
            transition: background 0.15s;
            color: var(--text-secondary);
            border-left: 3px solid transparent;
            touch-action: manipulation;
        }
        #nav-tree .session-list li:active {
            background: var(--hover-bg);
        }
        #nav-tree .session-list li.active {
            background: var(--accent);
            color: #fff;
            border-left-color: #fff;
            font-weight: 500;
        }
        #nav-tree .session-list li.active:active {
            background: var(--accent-hover);
        }
        #nav-tree .session-list li .sess-id {
            font-weight: 600;
            margin-right: 8px;
            opacity: 0.6;
            font-size: 0.75rem;
        }
        #nav-tree .session-list li.active .sess-id {
            opacity: 0.9;
        }

        #content {
            flex: 1 1 0%;
            min-width: 0;
            overflow-y: auto;
            padding: 16px 20px 40px 20px;
            background: var(--bg);
            transition: background 0.3s;
            -webkit-overflow-scrolling: touch;
            width: 100%;
            max-width: 100%;
            margin: 0;
        }

        #content .breadcrumb {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
        }
        #content .breadcrumb span {
            margin: 0 4px;
        }
        #content .session-indicators {
            background: var(--surface-2);
            border-left: 4px solid var(--accent);
            padding: 14px 16px;
            border-radius: var(--radius);
            margin-bottom: 20px;
        }
        #content .session-indicators h4 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        #content .session-indicators ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        #content .session-indicators ul li {
            padding: 4px 0;
            font-size: 0.95rem;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }
        #content .session-indicators ul li::before {
            content: '✓';
            color: var(--accent);
            font-weight: 700;
        }

        #content .session-content {
            font-size: 1rem;
            line-height: 1.7;
            color: var(--text);
        }
        #content .session-content h4 {
            font-size: 1.2rem;
            margin: 20px 0 12px 0;
            color: var(--text);
        }
        #content .session-content h5 {
            font-size: 1.05rem;
            margin: 16px 0 8px 0;
            color: var(--text);
        }
        #content .session-content p {
            margin: 0 0 14px 0;
        }
        #content .session-content ul,
        #content .session-content ol {
            margin: 0 0 14px 20px;
            padding-left: 8px;
        }
        #content .session-content li {
            margin-bottom: 6px;
        }
        #content .session-content img {
            width: 100%;
            height: auto;
            max-width: 100%;
            border-radius: var(--radius);
            margin: 16px 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            display: block;
        }
        #content .session-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
            font-size: 0.9rem;
            min-width: 300px;
        }
        #content .session-content table th,
        #content .session-content table td {
            border: 1px solid var(--border);
            padding: 8px 12px;
            text-align: left;
        }
        #content .session-content table th {
            background: var(--surface-2);
            font-weight: 600;
        }
        .table-wrap {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin: 8px 0;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .empty-state h2 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            color: var(--text);
        }

        @media (min-width: 768px) {
            #content {
                padding: 28px 48px 40px 48px;
            }
            #sidebar {
                max-width: 340px;
            }
            .topbar-actions button {
                width: 44px;
                height: 44px;
            }
        }

        @media (min-width: 1024px) {
            #content {
                padding: 36px 64px 48px 64px;
            }
        }

        .hidden {
            display: none !important;
        }
        .fade-in {
            animation: fadeIn 0.25s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #sidebar::-webkit-scrollbar,
        #content::-webkit-scrollbar {
            width: 5px;
        }
        #sidebar::-webkit-scrollbar-track,
        #content::-webkit-scrollbar-track {
            background: transparent;
        }
        #sidebar::-webkit-scrollbar-thumb,
        #content::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="app">
        <header id="topbar">
            <button id="hamburger" aria-label="Toggle navigation">☰</button>
            <div class="brand">
                📚 <span id="module-title">Loading…</span>
                <small id="module-code"></small>
            </div>
            <div class="topbar-actions">
                <select id="module-selector" aria-label="Switch module">
                    <option value="">— Select —</option>
                </select>
                <button id="themeToggle" aria-label="Toggle dark mode">🌙</button>
            </div>
        </header>

        <div id="overlay" aria-hidden="true"></div>

        <aside id="sidebar" role="navigation" aria-label="Module navigation">
            <div id="sidebar-header">
                <h2>📑 Contents</h2>
                <button id="sidebar-close" aria-label="Close navigation">✕</button>
            </div>
            <input type="text" id="search-box" placeholder="🔍 Search sessions..." autocomplete="off" />
            <nav id="nav-tree">
                <div class="empty-state" style="padding: 30px 10px;">
                    <p>Load a module to see contents.</p>
                </div>
            </nav>
        </aside>

        <main id="content" role="main">
            <div class="empty-state" id="welcome-message">
                <h2>👋 Welcome!</h2>
                <p>Select a module from the dropdown above to start learning.</p>
                <p style="margin-top: 12px; font-size: 0.9rem; color: var(--text-secondary);">
                    External JSON modules loaded from <code>/data/modules/</code>
                </p>
            </div>
            <div id="session-display" class="hidden"></div>
        </main>
    </div>

    <script>
        // ============================================================
        // 1. CONFIGURATION
        // ============================================================
        const CONFIG = {
            manifestUrl: './data/manifest.json',
            modulesBase: './data/modules/',
            cacheKey: 'module_'
        };

        // ============================================================
        // 2. APP STATE
        // ============================================================
        const state = {
            currentModule: null,
            currentUnitId: null,
            currentSessionId: null,
            sidebarOpen: false,
            theme: localStorage.getItem('theme') || 'light',
            searchQuery: '',
            manifest: null, // { modules: [ { code, title, file, icon } ] }
            moduleData: null // cached module object
        };

        // ============================================================
        // 3. DOM REFS
        // ============================================================
        const $ = (s) => document.querySelector(s);
        const $$ = (s) => document.querySelectorAll(s);

        const dom = {
            sidebar: $('#sidebar'),
            overlay: $('#overlay'),
            hamburger: $('#hamburger'),
            sidebarClose: $('#sidebar-close'),
            moduleTitle: $('#module-title'),
            moduleCode: $('#module-code'),
            moduleSelector: $('#module-selector'),
            themeToggle: $('#themeToggle'),
            searchBox: $('#search-box'),
            navTree: $('#nav-tree'),
            content: $('#content'),
            sessionDisplay: $('#session-display'),
            welcomeMsg: $('#welcome-message')
        };

        // ============================================================
        // 4. SIDEBAR TOGGLES (same as before)
        // ============================================================
        function closeSidebar() {
            state.sidebarOpen = false;
            dom.sidebar.classList.remove('open');
            dom.overlay.classList.remove('active');
        }

        function openSidebar() {
            state.sidebarOpen = true;
            dom.sidebar.classList.add('open');
            dom.overlay.classList.add('active');
        }

        // ============================================================
        // 5. THEME (unchanged)
        // ============================================================
        function applyTheme(theme) {
            state.theme = theme;
            localStorage.setItem('theme', theme);
            dom.themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
            document.body.classList.toggle('dark-mode', theme === 'dark');
        }

        function toggleTheme() {
            applyTheme(state.theme === 'light' ? 'dark' : 'light');
        }

        // ============================================================
        // 6. DATA LOADING (NEW!)
        // ============================================================

        // Load manifest from external JSON
        async function loadManifest() {
            try {
                const response = await fetch(CONFIG.manifestUrl);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                state.manifest = data;
                return data;
            } catch (error) {
                console.error('Failed to load manifest:', error);
                // Fallback: show error in dropdown
                dom.moduleSelector.innerHTML = `<option value="">⚠️ Manifest missing</option>`;
                dom.moduleTitle.textContent = 'Error';
                return null;
            }
        }

        // Load a specific module JSON (with cache)
        async function loadModuleData(moduleCode) {
    // Find the module entry in the manifest
    const moduleEntry = state.manifest.modules.find(m => m.code === moduleCode);
    if (!moduleEntry) {
        console.error('Module not found in manifest:', moduleCode);
        return null;
    }

    // Use the file key if it exists, otherwise construct from code
    const fileName = moduleEntry.file || (moduleCode.toLowerCase() + '.json');
    const url = CONFIG.modulesBase + fileName;

    console.log('Fetching:', url); // Debug: check the URL

    // Check localStorage cache
    const cacheKey = CONFIG.cacheKey + moduleCode;
    const cached = localStorage.getItem(cacheKey);
    if (cached) {
        try {
            const parsed = JSON.parse(cached);
            // Check if cache is less than 1 hour old (optional)
            if (parsed.timestamp && (Date.now() - parsed.timestamp < 3600000)) {
                console.log('Using cached data for:', moduleCode);
                return parsed.data;
            }
        } catch (e) { /* ignore */ }
    }

    // Fetch from server
    try {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP ${response.status} - ${url}`);
        const data = await response.json();

        // Store in localStorage
        const toStore = {
            data: data,
            timestamp: Date.now()
        };
        localStorage.setItem(cacheKey, JSON.stringify(toStore));

        return data;
    } catch (error) {
        console.error('Failed to load module:', error);
        dom.moduleTitle.textContent = 'Load Error';
        dom.moduleCode.textContent = '';
        dom.navTree.innerHTML = `
            <div class="empty-state">
                <p>Could not load module "${moduleCode}".</p>
                <p style="font-size:0.8rem;color:var(--text-secondary);">
                    Tried: ${url}<br>
                    Check that the file exists and is valid JSON.
                </p>
            </div>
        `;
        return null;
    }
}

        // ============================================================
        // 7. RENDER FUNCTIONS (adapt to external data)
        // ============================================================

        // Populate dropdown from manifest
        function populateModuleSelector(manifest) {
            if (!manifest || !manifest.modules) {
                dom.moduleSelector.innerHTML = `<option value="">— No modules —</option>`;
                return;
            }
            let html = `<option value=""> Select </option>`;
            manifest.modules.forEach(mod => {
                const label = mod.code;
                html += `<option value="${mod.code}">${label}</option>`;
            });
            dom.moduleSelector.innerHTML = html;
        }

        // Render sidebar from module data
        function renderSidebar(moduleData) {
            if (!moduleData || !moduleData.units) {
                dom.navTree.innerHTML = `<div class="empty-state"><p>No content.</p></div>`;
                return;
            }

            let html = '';
            moduleData.units.forEach(unit => {
                const isOpen = (state.currentUnitId === unit.id);
                html += `<details class="unit" ${isOpen ? 'open' : ''}>`;
                html += `<summary>Unit ${unit.id}: ${unit.title}</summary>`;
                html += `<ul class="session-list">`;
                unit.sessions.forEach(sess => {
                    const active = (state.currentUnitId === unit.id && state.currentSessionId === sess.id) ?
                        'active' : '';
                    html += `
                                <li class="${active}" data-unit="${unit.id}" data-session="${sess.id}">
                                    <span class="sess-id">${sess.id}</span> ${sess.title}
                                </li>
                            `;
                });
                html += `</ul></details>`;
            });

            dom.navTree.innerHTML = html;

            dom.navTree.querySelectorAll('.session-list li').forEach(el => {
                el.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const unitId = parseInt(this.dataset.unit);
                    const sessionId = parseInt(this.dataset.session);
                    loadSession(unitId, sessionId);
                    closeSidebar();
                });
            });

            if (state.currentUnitId) {
                const activeUnit = dom.navTree.querySelector(`.unit[open]`);
                if (activeUnit) {
                    setTimeout(() => activeUnit.scrollIntoView({ block: 'nearest' }), 50);
                }
            }
        }

        // Load a specific session (same as before, but uses state.moduleData)
        function loadSession(unitId, sessionId) {
            const moduleData = state.moduleData;
            if (!moduleData) return;

            const unit = moduleData.units.find(u => u.id === unitId);
            if (!unit) return;
            const session = unit.sessions.find(s => s.id === sessionId);
            if (!session) return;

            state.currentUnitId = unitId;
            state.currentSessionId = sessionId;
            window.location.hash = buildHash(state.currentModule, unitId, sessionId);

            let indicatorsHtml = '';
            if (session.indicators && session.indicators.length) {
                indicatorsHtml = `
                            <div class="session-indicators">
                                <h4>📌 Learning Indicators</h4>
                                <ul>
                                    ${session.indicators.map(i => `<li>${i}</li>`).join('')}
                                </ul>
                            </div>
                        `;
            }

            const contentHtml = `
                        <div class="breadcrumb">📖 Unit ${unitId} <span>›</span> Session ${sessionId}</div>
                        ${indicatorsHtml}
                        <div class="session-content fade-in">${session.content}</div>
                    `;

            dom.sessionDisplay.innerHTML = contentHtml;
            dom.sessionDisplay.classList.remove('hidden');
            dom.welcomeMsg.classList.add('hidden');
            dom.moduleTitle.textContent = moduleData.title || moduleData.code;
            dom.moduleCode.textContent = moduleData.code || '';

            // Update sidebar highlights
            dom.navTree.querySelectorAll('.session-list li').forEach(el => {
                el.classList.toggle('active',
                    parseInt(el.dataset.unit) === unitId &&
                    parseInt(el.dataset.session) === sessionId
                );
            });

            // Render KaTeX
            if (window.renderMathInElement) {
                try {
                    window.renderMathInElement(dom.sessionDisplay, {
                        delimiters: [
                            { left: '$$', right: '$$', display: true },
                            { left: '\\(', right: '\\)', display: false },
                            { left: '\\[', right: '\\]', display: true }
                        ],
                        throwOnError: false
                    });
                } catch (e) { console.warn('KaTeX error:', e); }
            }

            dom.content.scrollTop = 0;
        }

        // ============================================================
        // 8. MODULE LOADER (async)
        // ============================================================
        async function loadModule(moduleCode) {
            if (!moduleCode) {
                dom.welcomeMsg.classList.remove('hidden');
                dom.sessionDisplay.classList.add('hidden');
                dom.moduleTitle.textContent = 'Select a Module';
                dom.moduleCode.textContent = '';
                dom.navTree.innerHTML = `<div class="empty-state"><p>Select a module from the dropdown.</p></div>`;
                state.currentModule = null;
                state.moduleData = null;
                state.currentUnitId = null;
                state.currentSessionId = null;
                dom.moduleSelector.value = '';
                return;
            }

            // Show loading indicator
            dom.moduleTitle.textContent = 'Loading…';
            dom.moduleCode.textContent = moduleCode;

            const data = await loadModuleData(moduleCode);
            if (!data) {
                // Error already handled in loadModuleData
                dom.moduleTitle.textContent = 'Error';
                return;
            }

            // Success
            state.currentModule = moduleCode;
            state.moduleData = data;
            dom.moduleSelector.value = moduleCode;
            dom.moduleTitle.textContent = data.title || moduleCode;
            dom.moduleCode.textContent = data.code || '';

            renderSidebar(data);

            // Check hash for deep link
            const hash = parseHash();
            if (hash.unit && hash.session) {
                const unitExists = data.units.some(u => u.id === hash.unit);
                const sessionExists = data.units.some(u =>
                    u.id === hash.unit && u.sessions.some(s => s.id === hash.session)
                );
                if (unitExists && sessionExists) {
                    loadSession(hash.unit, hash.session);
                    return;
                }
            }

            // Load first session by default
            if (data.units.length && data.units[0].sessions.length) {
                loadSession(data.units[0].id, data.units[0].sessions[0].id);
            } else {
                dom.welcomeMsg.classList.remove('hidden');
                dom.sessionDisplay.classList.add('hidden');
            }
        }

        // ============================================================
        // 9. SEARCH (adapted to use state.moduleData)
        // ============================================================
        function handleSearch(query) {
            state.searchQuery = query.trim().toLowerCase();
            const moduleData = state.moduleData;
            if (!moduleData) return;

            const allSessions = [];
            moduleData.units.forEach(unit => {
                unit.sessions.forEach(sess => {
                    allSessions.push({
                        unitId: unit.id,
                        sessionId: sess.id,
                        title: sess.title.toLowerCase(),
                        content: sess.content.replace(/<[^>]+>/g, ' ').toLowerCase()
                    });
                });
            });

            const listItems = dom.navTree.querySelectorAll('.session-list li');
            if (!state.searchQuery) {
                listItems.forEach(el => el.style.display = 'flex');
                dom.navTree.querySelectorAll('.unit').forEach(d => d.open = (d.querySelector('.session-list li.active') !==
                    null));
                return;
            }

            const matchIds = new Set();
            allSessions.forEach(item => {
                if (item.title.includes(state.searchQuery) || item.content.includes(state.searchQuery)) {
                    matchIds.add(`${item.unitId}-${item.sessionId}`);
                }
            });

            listItems.forEach(el => {
                const key = `${el.dataset.unit}-${el.dataset.session}`;
                el.style.display = matchIds.has(key) ? 'flex' : 'none';
            });

            dom.navTree.querySelectorAll('.unit').forEach(details => {
                const hasVisible = details.querySelector('.session-list li[style*="flex"]');
                details.open = !!hasVisible;
            });
        }

        // ============================================================
        // 10. ROUTER / HASH HELPERS
        // ============================================================
        function parseHash() {
            const hash = window.location.hash.slice(1);
            const params = new URLSearchParams(hash);
            return {
                module: params.get('module') || null,
                unit: parseInt(params.get('unit')) || null,
                session: parseInt(params.get('session')) || null
            };
        }

        function buildHash(module, unit, session) {
            let parts = [];
            if (module) parts.push(`module=${module}`);
            if (unit) parts.push(`unit=${unit}`);
            if (session) parts.push(`session=${session}`);
            return '#' + parts.join('&');
        }

        // ============================================================
        // 11. INITIALIZATION (async)
        // ============================================================
        async function init() {
            // Theme
            applyTheme(state.theme);
            dom.themeToggle.addEventListener('click', toggleTheme);

            // Sidebar controls
            dom.hamburger.addEventListener('click', openSidebar);
            dom.sidebarClose.addEventListener('click', closeSidebar);
            dom.overlay.addEventListener('click', closeSidebar);

            // Module selector
            dom.moduleSelector.addEventListener('change', function() {
                if (this.value) {
                    window.location.hash = buildHash(this.value);
                } else {
                    window.location.hash = '';
                    loadModule(null);
                }
            });

            // Search
            dom.searchBox.addEventListener('input', function() {
                handleSearch(this.value);
            });

            // Load manifest
            const manifest = await loadManifest();
            if (manifest) {
                populateModuleSelector(manifest);
                state.manifest = manifest;
            } else {
                // Fallback: try to load a default module without manifest?
                // We'll just show error.
                dom.moduleTitle.textContent = 'No manifest';
                return;
            }

            // Hash change listener
            window.addEventListener('hashchange', async () => {
                const hash = parseHash();
                if (hash.module) {
                    await loadModule(hash.module);
                } else {
                    // If hash cleared, load first module from manifest
                    if (state.manifest && state.manifest.modules.length) {
                        const first = state.manifest.modules[0].code;
                        window.location.hash = buildHash(first);
                        await loadModule(first);
                    }
                }
            });

            // Initial load from hash or first module
            const hash = parseHash();
            if (hash.module) {
                await loadModule(hash.module);
            } else if (state.manifest && state.manifest.modules.length) {
                const first = state.manifest.modules[0].code;
                window.location.hash = buildHash(first);
                await loadModule(first);
            } else {
                dom.welcomeMsg.classList.remove('hidden');
                dom.sessionDisplay.classList.add('hidden');
                dom.moduleTitle.textContent = 'No modules found';
            }

            console.log('✅ B.Ed Module Viewer ready (external JSON)');
        }

        // Run
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
