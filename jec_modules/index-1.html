<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>B.Ed Module Viewer</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <style>
        /* ============================
                   CSS VARIABLES (Light/Dark)
                   ============================ */
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --surface-2: #f1f5f9;
            --text: #0f172a;
            --text-secondary: #475569;
            --border: #e2e8f0;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            --radius: 10px;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --hover-bg: #e2e8f0;
            --header-height: 60px;
            --sidebar-width: 320px;
        }

        body.dark-mode {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-2: #334155;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            --hover-bg: #334155;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
        }

        /* ============================
                   RESET & BASE
                   ============================ */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            height: 100vh;
            overflow: hidden;
        }
        button {
            font: inherit;
            cursor: pointer;
            background: none;
            border: none;
            color: inherit;
            touch-action: manipulation;
        }

        /* ============================
                   APP LAYOUT
                   ============================ */
        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ---- Top Bar (Always on top, hamburger visible) ---- */
        #topbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 16px;
            height: var(--header-height);
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            z-index: 100;
            transition: background 0.3s, border-color 0.3s;
        }
        #topbar .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        #topbar .brand small {
            font-weight: 400;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-left: 4px;
        }
        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }
        .topbar-actions button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            background: transparent;
            transition: background 0.2s;
        }
        .topbar-actions button:hover,
        .topbar-actions button:active {
            background: var(--hover-bg);
        }

        /* HAMBURGER - ALWAYS VISIBLE */
        #hamburger {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5rem;
            background: transparent;
            flex-shrink: 0;
            transition: background 0.2s;
        }
        #hamburger:active {
            background: var(--hover-bg);
        }

        /* Module Selector */
        #module-selector {
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            max-width: 160px;
            cursor: pointer;
            outline: none;
            transition: background 0.3s, border-color 0.3s;
        }
        #module-selector:focus {
            border-color: var(--accent);
        }

        /* ---- Overlay (click to close sidebar) ---- */
        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 150;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }
        #overlay.active {
            display: block;
            opacity: 1;
        }

        /* ---- Sidebar (Off-canvas on ALL screen sizes) ---- */
        #sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 85%;
            max-width: var(--sidebar-width);
            height: 100%;
            background: var(--surface);
            border-right: 1px solid var(--border);
            z-index: 200;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        #sidebar.open {
            transform: translateX(0);
        }

        #sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 16px 12px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        #sidebar-header h2 {
            font-size: 1rem;
            font-weight: 600;
        }
        #sidebar-close {
            font-size: 1.5rem;
            padding: 4px 8px;
            border-radius: 6px;
        }
        #sidebar-close:active {
            background: var(--hover-bg);
        }

        /* Search */
        #search-box {
            margin: 12px 16px;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 0.95rem;
            width: calc(100% - 32px);
            flex-shrink: 0;
            transition: border-color 0.2s, background 0.3s;
            outline: none;
        }
        #search-box:focus {
            border-color: var(--accent);
        }
        #search-box::placeholder {
            color: var(--text-secondary);
        }

        /* Sidebar Navigation Tree */
        #nav-tree {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px 20px 12px;
            -webkit-overflow-scrolling: touch;
        }
        #nav-tree .unit {
            margin-top: 8px;
            border-radius: 6px;
            overflow: hidden;
        }
        #nav-tree .unit summary {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            font-weight: 600;
            font-size: 0.9rem;
            border-radius: 6px;
            cursor: pointer;
            list-style: none;
            min-height: 44px;
            touch-action: manipulation;
            background: var(--surface-2);
            transition: background 0.2s;
        }
        #nav-tree .unit summary::-webkit-details-marker {
            display: none;
        }
        #nav-tree .unit summary::before {
            content: '▶';
            font-size: 0.7rem;
            margin-right: 10px;
            transition: transform 0.2s;
            color: var(--text-secondary);
        }
        #nav-tree .unit[open] summary::before {
            transform: rotate(90deg);
        }
        #nav-tree .unit summary:active {
            background: var(--hover-bg);
        }

        #nav-tree .session-list {
            padding: 4px 0 4px 16px;
            margin: 0;
            list-style: none;
        }
        #nav-tree .session-list li {
            padding: 10px 12px;
            font-size: 0.9rem;
            border-radius: 6px;
            cursor: pointer;
            min-height: 44px;
            display: flex;
            align-items: center;
            transition: background 0.15s;
            color: var(--text-secondary);
            border-left: 3px solid transparent;
            touch-action: manipulation;
        }
        #nav-tree .session-list li:active {
            background: var(--hover-bg);
        }
        #nav-tree .session-list li.active {
            background: var(--accent);
            color: #fff;
            border-left-color: #fff;
            font-weight: 500;
        }
        #nav-tree .session-list li.active:active {
            background: var(--accent-hover);
        }
        #nav-tree .session-list li .sess-id {
            font-weight: 600;
            margin-right: 8px;
            opacity: 0.6;
            font-size: 0.75rem;
        }
        #nav-tree .session-list li.active .sess-id {
            opacity: 0.9;
        }

        /* ---- Main Content (TAKES 100% WIDTH ALWAYS) ---- */
        #content {
            flex: 1 1 0%;
            min-width: 0;
            overflow-y: auto;
            padding: 16px 20px 40px 20px;
            background: var(--bg);
            transition: background 0.3s;
            -webkit-overflow-scrolling: touch;
            width: 100%;
            max-width: 100%;
            margin: 0;
        }

        #content .breadcrumb {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
        }
        #content .breadcrumb span {
            margin: 0 4px;
        }
        #content .session-indicators {
            background: var(--surface-2);
            border-left: 4px solid var(--accent);
            padding: 14px 16px;
            border-radius: var(--radius);
            margin-bottom: 20px;
        }
        #content .session-indicators h4 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        #content .session-indicators ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        #content .session-indicators ul li {
            padding: 4px 0;
            font-size: 0.95rem;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }
        #content .session-indicators ul li::before {
            content: '✓';
            color: var(--accent);
            font-weight: 700;
        }

        #content .session-content {
            font-size: 1rem;
            line-height: 1.7;
            color: var(--text);
        }
        #content .session-content h4 {
            font-size: 1.2rem;
            margin: 20px 0 12px 0;
            color: var(--text);
        }
        #content .session-content h5 {
            font-size: 1.05rem;
            margin: 16px 0 8px 0;
            color: var(--text);
        }
        #content .session-content p {
            margin: 0 0 14px 0;
        }
        #content .session-content ul,
        #content .session-content ol {
            margin: 0 0 14px 20px;
            padding-left: 8px;
        }
        #content .session-content li {
            margin-bottom: 6px;
        }
        #content .session-content img {
            max-width: 100%;
            height: auto;
            border-radius: var(--radius);
            margin: 16px 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            display: block;
        }
        #content .session-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
            font-size: 0.9rem;
            min-width: 300px;
        }
        #content .session-content table th,
        #content .session-content table td {
            border: 1px solid var(--border);
            padding: 8px 12px;
            text-align: left;
        }
        #content .session-content table th {
            background: var(--surface-2);
            font-weight: 600;
        }
        .table-wrap {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin: 8px 0;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .empty-state h2 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            color: var(--text);
        }

        /* ============================
                   RESPONSIVE: Only padding changes, layout stays the same
                   ============================ */
        @media (min-width: 768px) {
            #content {
                padding: 28px 48px 40px 48px;
            }
            #sidebar {
                max-width: 340px;
            }
            .topbar-actions button {
                width: 44px;
                height: 44px;
            }
        }

        @media (min-width: 1024px) {
            #content {
                padding: 36px 64px 48px 64px;
            }
        }

        /* ============================
                   UTILITY & ANIMATIONS
                   ============================ */
        .hidden {
            display: none !important;
        }
        .fade-in {
            animation: fadeIn 0.25s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Scrollbar styling */
        #sidebar::-webkit-scrollbar,
        #content::-webkit-scrollbar {
            width: 5px;
        }
        #sidebar::-webkit-scrollbar-track,
        #content::-webkit-scrollbar-track {
            background: transparent;
        }
        #sidebar::-webkit-scrollbar-thumb,
        #content::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- ==================== TOP BAR ==================== -->
        <header id="topbar">
            <button id="hamburger" aria-label="Toggle navigation">☰</button>
            <div class="brand">
                📚 <span id="module-title">Select a Module</span>
                <small id="module-code"></small>
            </div>
            <div class="topbar-actions">
                <select id="module-selector" aria-label="Switch module">
                    <option value="">— Switch —</option>
                </select>
                <button id="themeToggle" aria-label="Toggle dark mode">🌙</button>
            </div>
        </header>

        <!-- ==================== OVERLAY ==================== -->
        <div id="overlay" aria-hidden="true"></div>

        <!-- ==================== SIDEBAR (Off-canvas on ALL sizes) ==================== -->
        <aside id="sidebar" role="navigation" aria-label="Module navigation">
            <div id="sidebar-header">
                <h2>📑 Contents</h2>
                <button id="sidebar-close" aria-label="Close navigation">✕</button>
            </div>
            <input type="text" id="search-box" placeholder="🔍 Search sessions..." autocomplete="off" />
            <nav id="nav-tree">
                <div class="empty-state" style="padding: 30px 10px;">
                    <p>Load a module to see contents.</p>
                </div>
            </nav>
        </aside>

        <!-- ==================== MAIN CONTENT (100% width) ==================== -->
        <main id="content" role="main">
            <div class="empty-state" id="welcome-message">
                <h2>👋 Welcome!</h2>
                <p>Select a module from the dropdown above to start learning.</p>
                <p style="margin-top: 12px; font-size: 0.9rem; color: var(--text-secondary);">
                    JEN 117 &amp; JED 115 are pre‑loaded for this prototype.
                </p>
            </div>
            <div id="session-display" class="hidden"></div>
        </main>
    </div>

    <script>
        // ============================================================
        // 1. MOCK MODULE DATA (2 modules with placeholder images)
        // ============================================================
        const MOCK_MODULES = {
            'jen117': {
                code: 'JEN 117',
                title: 'Introduction to Language and Literacy',
                units: [{
                    id: 1,
                    title: 'Unit 1: Nature of Language',
                    sessions: [{
                        id: 1,
                        title: 'Session 1: What is Language?',
                        indicators: ['Define language', 'Explain why language is unique to humans'],
                        content: `
                            <p>Language is a medium through which we express our thoughts and feelings. It is a system of arbitrary vocal symbols used for human communication.</p>
                            <img src="https://picsum.photos/seed/language1/800/400" alt="Abstract representation of language" />
                            <p>Unlike animal communication, human language is <b>productive</b> – we can create infinite new sentences. It is also <b>culturally transmitted</b>, passed from one generation to the next.</p>
                            <p>Example: \\(E = mc^2\\) is a formula, but language lets us discuss it!</p>
                        `
                    }, {
                        id: 2,
                        title: 'Session 2: Properties of Language',
                        indicators: ['Explain arbitrariness', 'Explain displacement', 'List the design features'],
                        content: `
                            <p>Key properties of human language:</p>
                            <ul>
                                <li><b>Arbitrariness:</b> No natural link between a word and its meaning. E.g., 'pepper' vs 'atadi'.</li>
                                <li><b>Displacement:</b> We can talk about the past, future, and imaginary things.</li>
                                <li><b>Discreteness:</b> Distinct sounds like /p/ and /b/ change meaning.</li>
                            </ul>
                            <img src="https://picsum.photos/seed/language2/800/400" alt="Visual of language properties" />
                            <p>These features make human language infinitely flexible.</p>
                        `
                    }]
                }, {
                    id: 2,
                    title: 'Unit 2: Literacy Development',
                    sessions: [{
                        id: 1,
                        title: 'Session 1: Stages of Literacy',
                        indicators: ['Identify the five foundations of reading', 'Describe the consolidation stage'],
                        content: `
                            <p>Literacy develops in stages:</p>
                            <ul>
                                <li><b>Foundation:</b> Phonemic awareness, phonics, vocabulary.</li>
                                <li><b>Beginning:</b> Decoding and encoding words.</li>
                                <li><b>Consolidation / Fluency:</b> Reading becomes automatic.</li>
                                <li><b>Growth:</b> Reading to learn new concepts.</li>
                            </ul>
                            <div class="table-wrap">
                                <table>
                                    <tr><th>Stage</th><th>Key Skill</th></tr>
                                    <tr><td>Foundation</td><td>Phonemic awareness</td></tr>
                                    <tr><td>Beginning</td><td>Blending sounds</td></tr>
                                    <tr><td>Consolidation</td><td>Fluent reading</td></tr>
                                </table>
                            </div>
                            <p><i>Image below: A classroom literacy activity.</i></p>
                            <img src="https://picsum.photos/seed/literacy1/800/400" alt="Children learning to read" />
                        `
                    }]
                }]
            },
            'jed115': {
                code: 'JED 115',
                title: 'Educational Foundations',
                units: [{
                    id: 1,
                    title: 'Unit 1: History of Education',
                    sessions: [{
                        id: 1,
                        title: 'Session 1: Traditional African Education',
                        indicators: ['Describe the aims of indigenous education', 'List its key strengths'],
                        content: `
                            <p>Traditional African education was holistic, aiming to develop the whole person – physically, morally, and vocationally.</p>
                            <img src="https://picsum.photos/seed/africa1/800/400" alt="Traditional African setting" />
                            <p><b>Strengths:</b> Cost-effective, community-based, and practical. Every adult was a teacher.</p>
                            <p>However, it lacked formal measurement and was resistant to change.</p>
                        `
                    }, {
                        id: 2,
                        title: 'Session 2: Colonial Education in Ghana',
                        indicators: ['Explain the Castle Schools', 'Discuss the curriculum'],
                        content: `
                            <p>Castle Schools were established by European merchants along the coast. Their rationale:</p>
                            <ul>
                                <li>Educate mulatto children.</li>
                                <li>Train interpreters for trade.</li>
                                <li>Spread Christianity.</li>
                            </ul>
                            <img src="https://picsum.photos/seed/castle1/800/400" alt="Historical castle school" />
                            <p>The curriculum focused on the <b>3Rs</b> (Reading, wRiting, aRithmetic) and religious instruction. Challenges included low enrolment, wars, and funding issues.</p>
                            <p>Use \\(\\frac{a}{b}\\) to show proportions of students who attended.</p>
                        `
                    }]
                }, {
                    id: 2,
                    title: 'Unit 2: Modern Education Policy',
                    sessions: [{
                        id: 1,
                        title: 'Session 1: The 1961 Education Act',
                        indicators: ['List the key provisions of the Act', 'Discuss the challenges'],
                        content: `
                            <p>The 1961 Education Act was Ghana's first major post-independence education law. Key provisions:</p>
                            <ul>
                                <li>Compulsory, free basic education.</li>
                                <li>6 years primary + 4 years middle school.</li>
                                <li>Defined powers of the Minister of Education.</li>
                            </ul>
                            <p>Challenges: shortage of teachers, inadequate funding, and rural-urban disparities.</p>
                            <img src="https://picsum.photos/seed/ghana1/800/400" alt="Modern Ghanaian classroom" />
                            <p>This Act laid the foundation for today's education system.</p>
                        `
                    }]
                }]
            }
        };

        // ============================================================
        // 2. APP STATE
        // ============================================================
        const state = {
            currentModule: null,
            currentUnitId: null,
            currentSessionId: null,
            sidebarOpen: false,
            theme: localStorage.getItem('theme') || 'light',
            searchQuery: ''
        };

        // ============================================================
        // 3. DOM REFS
        // ============================================================
        const $ = (sel) => document.querySelector(sel);
        const $$ = (sel) => document.querySelectorAll(sel);

        const dom = {
            sidebar: $('#sidebar'),
            overlay: $('#overlay'),
            hamburger: $('#hamburger'),
            sidebarClose: $('#sidebar-close'),
            moduleTitle: $('#module-title'),
            moduleCode: $('#module-code'),
            moduleSelector: $('#module-selector'),
            themeToggle: $('#themeToggle'),
            searchBox: $('#search-box'),
            navTree: $('#nav-tree'),
            content: $('#content'),
            sessionDisplay: $('#session-display'),
            welcomeMsg: $('#welcome-message')
        };

        // ============================================================
        // 4. HELPERS (Sidebar toggles WITHOUT screen-width checks)
        // ============================================================
        function closeSidebar() {
            state.sidebarOpen = false;
            dom.sidebar.classList.remove('open');
            dom.overlay.classList.remove('active');
        }

        function openSidebar() {
            state.sidebarOpen = true;
            dom.sidebar.classList.add('open');
            dom.overlay.classList.add('active');
        }

        function getModuleData(code) {
            return MOCK_MODULES[code] || null;
        }

        function getAllModuleCodes() {
            return Object.keys(MOCK_MODULES);
        }

        function parseHash() {
            const hash = window.location.hash.slice(1);
            const params = new URLSearchParams(hash);
            return {
                module: params.get('module') || null,
                unit: parseInt(params.get('unit')) || null,
                session: parseInt(params.get('session')) || null
            };
        }

        function buildHash(module, unit, session) {
            let parts = [];
            if (module) parts.push(`module=${module}`);
            if (unit) parts.push(`unit=${unit}`);
            if (session) parts.push(`session=${session}`);
            return '#' + parts.join('&');
        }

        // ============================================================
        // 5. THEME
        // ============================================================
        function applyTheme(theme) {
            state.theme = theme;
            localStorage.setItem('theme', theme);
            dom.themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
            document.body.classList.toggle('dark-mode', theme === 'dark');
        }

        function toggleTheme() {
            applyTheme(state.theme === 'light' ? 'dark' : 'light');
        }

        // ============================================================
        // 6. RENDER: SIDEBAR
        // ============================================================
        function renderSidebar(moduleData) {
            if (!moduleData) {
                dom.navTree.innerHTML = `<div class="empty-state"><p>No module loaded.</p></div>`;
                return;
            }

            let html = '';
            moduleData.units.forEach(unit => {
                const isOpen = (state.currentUnitId === unit.id);
                html += `<details class="unit" ${isOpen ? 'open' : ''}>`;
                html += `<summary>Unit ${unit.id}: ${unit.title}</summary>`;
                html += `<ul class="session-list">`;
                unit.sessions.forEach(sess => {
                    const active = (state.currentUnitId === unit.id && state.currentSessionId === sess.id) ?
                        'active' : '';
                    html += `
                                <li class="${active}" data-unit="${unit.id}" data-session="${sess.id}">
                                    <span class="sess-id">${sess.id}</span> ${sess.title}
                                </li>
                            `;
                });
                html += `</ul></details>`;
            });

            dom.navTree.innerHTML = html;

            dom.navTree.querySelectorAll('.session-list li').forEach(el => {
                el.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const unitId = parseInt(this.dataset.unit);
                    const sessionId = parseInt(this.dataset.session);
                    loadSession(unitId, sessionId);
                    closeSidebar(); // Auto-close after click on ALL devices
                });
            });

            if (state.currentUnitId) {
                const activeUnit = dom.navTree.querySelector(`.unit[open]`);
                if (activeUnit) {
                    setTimeout(() => activeUnit.scrollIntoView({ block: 'nearest' }), 50);
                }
            }
        }

        // ============================================================
        // 7. RENDER: CONTENT
        // ============================================================
        function loadSession(unitId, sessionId) {
            const moduleData = getModuleData(state.currentModule);
            if (!moduleData) return;

            const unit = moduleData.units.find(u => u.id === unitId);
            if (!unit) return;
            const session = unit.sessions.find(s => s.id === sessionId);
            if (!session) return;

            state.currentUnitId = unitId;
            state.currentSessionId = sessionId;
            window.location.hash = buildHash(state.currentModule, unitId, sessionId);

            let indicatorsHtml = '';
            if (session.indicators && session.indicators.length) {
                indicatorsHtml = `
                            <div class="session-indicators">
                                <h4>📌 Learning Indicators</h4>
                                <ul>
                                    ${session.indicators.map(i => `<li>${i}</li>`).join('')}
                                </ul>
                            </div>
                        `;
            }

            const contentHtml = `
                        <div class="breadcrumb">📖 Unit ${unitId} <span>›</span> Session ${sessionId}</div>
                        ${indicatorsHtml}
                        <div class="session-content fade-in">${session.content}</div>
                    `;

            dom.sessionDisplay.innerHTML = contentHtml;
            dom.sessionDisplay.classList.remove('hidden');
            dom.welcomeMsg.classList.add('hidden');
            dom.moduleTitle.textContent = moduleData.title;
            dom.moduleCode.textContent = moduleData.code;

            dom.navTree.querySelectorAll('.session-list li').forEach(el => {
                el.classList.toggle('active',
                    parseInt(el.dataset.unit) === unitId &&
                    parseInt(el.dataset.session) === sessionId
                );
            });

            if (window.renderMathInElement) {
                try {
                    window.renderMathInElement(dom.sessionDisplay, {
                        delimiters: [
                            { left: '$$', right: '$$', display: true },
                            { left: '\\(', right: '\\)', display: false },
                            { left: '\\[', right: '\\]', display: true }
                        ],
                        throwOnError: false
                    });
                } catch (e) { console.warn('KaTeX render error:', e); }
            }

            dom.content.scrollTop = 0;
        }

        // ============================================================
        // 8. LOAD MODULE
        // ============================================================
        function loadModule(moduleCode) {
            if (!moduleCode) {
                dom.welcomeMsg.classList.remove('hidden');
                dom.sessionDisplay.classList.add('hidden');
                dom.moduleTitle.textContent = 'Select a Module';
                dom.moduleCode.textContent = '';
                dom.navTree.innerHTML =
                    `<div class="empty-state" style="padding:30px 10px;"><p>Load a module to see contents.</p></div>`;
                state.currentModule = null;
                state.currentUnitId = null;
                state.currentSessionId = null;
                dom.moduleSelector.value = '';
                return;
            }

            const data = getModuleData(moduleCode);
            if (!data) {
                alert(`Module "${moduleCode}" not found.`);
                return;
            }

            state.currentModule = moduleCode;
            dom.moduleSelector.value = moduleCode;
            dom.moduleTitle.textContent = data.title;
            dom.moduleCode.textContent = data.code;
            renderSidebar(data);

            const hash = parseHash();
            if (hash.unit && hash.session) {
                const unitExists = data.units.some(u => u.id === hash.unit);
                const sessionExists = data.units.some(u =>
                    u.id === hash.unit && u.sessions.some(s => s.id === hash.session)
                );
                if (unitExists && sessionExists) {
                    loadSession(hash.unit, hash.session);
                    return;
                }
            }

            if (data.units.length && data.units[0].sessions.length) {
                loadSession(data.units[0].id, data.units[0].sessions[0].id);
            } else {
                dom.welcomeMsg.classList.remove('hidden');
                dom.sessionDisplay.classList.add('hidden');
            }
        }

        // ============================================================
        // 9. SEARCH
        // ============================================================
        function handleSearch(query) {
            state.searchQuery = query.trim().toLowerCase();
            const moduleData = getModuleData(state.currentModule);
            if (!moduleData) return;

            const allSessions = [];
            moduleData.units.forEach(unit => {
                unit.sessions.forEach(sess => {
                    allSessions.push({
                        unitId: unit.id,
                        sessionId: sess.id,
                        title: sess.title.toLowerCase(),
                        content: sess.content.replace(/<[^>]+>/g, ' ').toLowerCase()
                    });
                });
            });

            const listItems = dom.navTree.querySelectorAll('.session-list li');
            if (!state.searchQuery) {
                listItems.forEach(el => el.style.display = 'flex');
                dom.navTree.querySelectorAll('.unit').forEach(d => d.open = (d.querySelector('.session-list li.active') !==
                    null));
                return;
            }

            const matchIds = new Set();
            allSessions.forEach(item => {
                if (item.title.includes(state.searchQuery) || item.content.includes(state.searchQuery)) {
                    matchIds.add(`${item.unitId}-${item.sessionId}`);
                }
            });

            listItems.forEach(el => {
                const key = `${el.dataset.unit}-${el.dataset.session}`;
                el.style.display = matchIds.has(key) ? 'flex' : 'none';
            });

            dom.navTree.querySelectorAll('.unit').forEach(details => {
                const hasVisible = details.querySelector('.session-list li[style*="flex"]');
                details.open = !!hasVisible;
            });
        }

        // ============================================================
        // 10. INIT
        // ============================================================
        function populateModuleSelector() {
            const codes = getAllModuleCodes();
            dom.moduleSelector.innerHTML = `<option value="">— Select —</option>`;
            codes.forEach(code => {
                const data = getModuleData(code);
                dom.moduleSelector.innerHTML +=
                    `<option value="${code}">${data ? data.code + ' – ' + data.title : code}</option>`;
            });
        }

        function handleHashChange() {
            const hash = parseHash();
            if (hash.module) loadModule(hash.module);
            else {
                const codes = getAllModuleCodes();
                if (codes.length) loadModule(codes[0]);
            }
        }

        function init() {
            applyTheme(state.theme);
            dom.themeToggle.addEventListener('click', toggleTheme);

            // Hamburger: open on click (works on ALL sizes)
            dom.hamburger.addEventListener('click', openSidebar);

            // Close buttons
            dom.sidebarClose.addEventListener('click', closeSidebar);
            dom.overlay.addEventListener('click', closeSidebar);

            dom.moduleSelector.addEventListener('change', function() {
                if (this.value) window.location.hash = buildHash(this.value);
                else { window.location.hash = '';
                    loadModule(null); }
            });

            dom.searchBox.addEventListener('input', function() { handleSearch(this.value); });

            populateModuleSelector();
            window.addEventListener('hashchange', handleHashChange);

            const hash = parseHash();
            if (hash.module) loadModule(hash.module);
            else {
                const codes = getAllModuleCodes();
                if (codes.length) {
                    const first = codes[0];
                    window.location.hash = buildHash(first);
                    loadModule(first);
                }
            }

            // Ensure sidebar is closed on any resize (optional, good UX)
            window.addEventListener('resize', () => {
                // Keep it closed unless user opens it manually.
                // If you want to keep it open on a specific breakpoint, you can add logic here,
                // but the user wants "exactly like mobile", so we leave it off-canvas always.
            });

            console.log('✅ B.Ed Module Viewer ready! Hamburger works on ALL screen sizes.');
        }

        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
        else init();
    </script>
</body>
</html>
